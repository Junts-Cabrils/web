<!DOCTYPE html>
<html lang="ca">
<head>

<meta charset="UTF-8">
<title>Convocatòries</title>

<link rel="manifest" href="manifest.json">

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0b3a63">

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f3f4f6;
color:#1f2937;
}

.barra-superior{
display:flex;
align-items:center;
gap:12px;
padding:10px 14px;
background:#163B65;
color:white;
position:sticky;
top:0;
z-index:1000;
}

.boto-tornar{
color:white;
text-decoration:none;
font-size:24px;
font-weight:bold;
line-height:1;
display:inline-block;
padding:2px 4px;
}

.titol-pagina{
font-size:18px;
font-weight:bold;
letter-spacing:0.3px;
}

.contingut{
padding:12px;
}
.targeta{
background:white;
border-radius:14px;
padding:14px;
margin-bottom:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.targeta-data{
font-size:13px;
font-weight:bold;
color:#163B65;
margin-bottom:6px;
text-transform:uppercase;
}

.targeta-titol{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
color:#111827;
}

.targeta-text{
font-size:15px;
line-height:1.45;
color:#374151;
white-space:pre-line;
}


  
</style>

</head>

  <script>
const URL_CONVOCATORIES = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSppmvurw7sZCa1GtfZ7kF72Voudj29-SawqkXVQxUrX4yu2LmXCmGp5-naYY1mhw/pub?output=csv";

function parseCSV(text){
  const lines = text.trim().split("\n");
  return lines.map(line => {
    const result = [];
    let current = "";
    let insideQuotes = false;

    for(let i=0; i<line.length; i++){
      const char = line[i];

      if(char === '"'){
        if(insideQuotes && line[i + 1] === '"'){
          current += '"';
          i++;
        } else {
          insideQuotes = !insideQuotes;
        }
      } else if(char === "," && !insideQuotes){
        result.push(current);
        current = "";
      } else {
        current += char;
      }
    }

    result.push(current);
    return result;
  });
}

function formatData(dataISO){
  if(!dataISO) return "";
  const parts = dataISO.split("-");
  if(parts.length !== 3) return dataISO;
  return `${parts[2]}-${parts[1]}-${parts[0]}`;
}

fetch(URL_CONVOCATORIES)
  .then(response => response.text())
  .then(csv => {
    const files = parseCSV(csv);
    const capcalera = files[0];
    const filesDades = files.slice(1);

    const idxVisible = capcalera.indexOf("visible");
    const idxData = capcalera.indexOf("data");
    const idxTitol = capcalera.indexOf("titol");
    const idxText = capcalera.indexOf("text");

    const convocatories = filesDades
      .filter(f => f[idxVisible] && f[idxVisible].trim().toLowerCase() === "si")
      .sort((a,b) => new Date(a[idxData]) - new Date(b[idxData]));

    const contenidor = document.getElementById("llista-convocatories");

    if(convocatories.length === 0){
      contenidor.innerHTML = "<div class='targeta'>No hi ha cap convocatòria visible.</div>";
      return;
    }

    contenidor.innerHTML = convocatories.map(f => `
      <div class="targeta">
        <div class="targeta-data">${formatData(f[idxData])}</div>
        <div class="targeta-titol">${f[idxTitol] || ""}</div>
        <div class="targeta-text">${f[idxText] || ""}</div>
      </div>
    `).join("");
  })
  .catch(error => {
    document.getElementById("llista-convocatories").innerHTML =
      "<div class='targeta'>Error carregant l'agenda.</div>";
    console.error(error);
  });
</script>




  
<body>

<div class="barra-superior">
  <a href="index.html" class="boto-tornar" onclick="history.back(); return false;">←</a>
  <div class="titol-pagina">AGENDA</div>
</div>

<div class="contingut">
  <div id="llista-convocatories">Carregant agenda...</div>
</div>

<a class="tornar" href="index.html">← Tornar</a>

</div>

</body>
</html>
