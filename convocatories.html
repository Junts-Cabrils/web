<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Convocatòries</title>
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0b3a63">
<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#163B65;
color:white;
}

.barra-superior{
display:flex;
align-items:center;
gap:12px;
padding:10px 14px;
background:#163B65;
color:white;
position:sticky;
top:0;
z-index:1000;
}

.boto-tornar{
color:white;
text-decoration:none;
font-size:24px;
font-weight:bold;
line-height:1;
display:inline-block;
padding:2px 4px;
}

.titol-pagina{
font-size:18px;
font-weight:bold;
letter-spacing:0.3px;
}

.contingut{
max-width:700px;
margin:auto;
padding:20px 16px 30px 16px;
}
  
.targeta{
background:white;
color:#163B65;
border-radius:16px;
padding:16px;
margin-bottom:18px;
box-shadow:0 6px 16px rgba(0,0,0,0.2);
}

.targeta-data{
font-size:13px;
color:#666;
margin-bottom:8px;
font-weight:normal;
text-transform:none;
}

.targeta-titol{
margin:0 0 8px 0;
font-size:22px;
font-weight:bold;
color:#163B65;
}

.targeta-meta{
font-size:14px;
line-height:1.35;
color:#163B65;
margin:0 0 8px 0;
white-space:pre-line;
}

.targeta-text{
margin:0;
font-size:15px;
line-height:1.4;
color:#163B65;
white-space:pre-line;
}

.img-noticia{
width:100%;
border-radius:12px;
margin-bottom:10px;
display:block;
}

.boto-enllac{
display:inline-block;
margin-top:10px;
padding:6px 10px;
background:#163B65;
color:white;
text-decoration:none;
border-radius:6px;
font-size:14px;
font-weight:bold;
}
</style>
</head>
<body>
<div class="barra-superior">
  <a href="index.html" class="boto-tornar" onclick="history.back(); return false;">←</a>
  <div class="titol-pagina">AGENDA</div>
</div>

<div class="contingut">
  <div id="llista-convocatories">Carregant agenda...</div>
</div>

<script>
const URL_CONVOCATORIES = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSppmvurw7sZCa1GtfZ7kF72Voudj29-SawqkXVQxUrX4yu2LmXCmGp5-naYY1mhw/pub?output=csv";

function parseCSV(text){
  const lines = text.trim().split(/\r?\n/);
  return lines.map(line => {
    const result = [];
    let current = "";
    let insideQuotes = false;

    for(let i = 0; i < line.length; i++){
      const char = line[i];

      if(char === '"'){
        if(insideQuotes && line[i + 1] === '"'){
          current += '"';
          i++;
        } else {
          insideQuotes = !insideQuotes;
        }
      } else if(char === ',' && !insideQuotes){
        result.push(current);
        current = "";
      } else {
        current += char;
      }
    }

    result.push(current);
    return result;
  });
}

function formatData(dataISO){
  if(!dataISO) return "";
  const parts = dataISO.trim().split("-");
  if(parts.length !== 3) return dataISO;
  return `${parts[2]}-${parts[1]}-${parts[0]}`;
}

function net(v){
  return (v || "").trim();
}

fetch(URL_CONVOCATORIES, { cache: "no-store" })
  .then(response => response.text())
  .then(csv => {
    const files = parseCSV(csv);
    const capcalera = files[0].map(c => c.trim().toLowerCase());
    const filesDades = files.slice(1);

    const idxVisible = capcalera.indexOf("visible");
    const idxData = capcalera.indexOf("data");
    const idxTitol = capcalera.indexOf("titol");
    const idxLloc = capcalera.indexOf("lloc");
    const idxHora = capcalera.indexOf("hora");
    const idxText = capcalera.indexOf("text");
    const idxImatge = capcalera.indexOf("imatge");
    const idxEnllac = capcalera.indexOf("enllac");

    const convocatories = filesDades
      .filter(f => net(f[idxVisible]).toLowerCase() === "si")
      .sort((a,b) => new Date(net(a[idxData])) - new Date(net(b[idxData])));

    const contenidor = document.getElementById("llista-convocatories");

    if(convocatories.length === 0){
      contenidor.innerHTML = "<div class='targeta'>No hi ha cap convocatòria visible.</div>";
      return;
    }

    contenidor.innerHTML = convocatories.map(f => {
      const data = idxData >= 0 ? net(f[idxData]) : "";
      const titol = idxTitol >= 0 ? net(f[idxTitol]) : "";
      const lloc = idxLloc >= 0 ? net(f[idxLloc]) : "";
      const hora = idxHora >= 0 ? net(f[idxHora]) : "";
      const text = idxText >= 0 ? net(f[idxText]) : "";
      const imatge = idxImatge >= 0 ? net(f[idxImatge]) : "";
      const enllac = idxEnllac >= 0 ? net(f[idxEnllac]) : "";

      const meta = [
        lloc ? `📍 ${lloc}` : "",
        hora ? `🕐 ${hora}` : ""
      ].filter(Boolean).join("\n");

      return `
      <div class="targeta">
        ${imatge ? `<img src="${imatge}" class="img-noticia">` : ""}
        <div class="targeta-data">${formatData(data)}</div>
        <div class="targeta-titol">${titol}</div>
        ${meta ? `<div class="targeta-meta">${meta}</div>` : ""}
        <div class="targeta-text">${text}</div>
        ${enllac ? `<a href="${enllac}" target="_blank" rel="noopener noreferrer" class="boto-enllac">Veure més</a>` : ""}
      </div>`;
    }).join("");
  })
  .catch(error => {
    document.getElementById("llista-convocatories").innerHTML =
      "<div class='targeta'>Error carregant l'agenda.</div>";
    console.error(error);
  });
</script>
</body>
</html>
