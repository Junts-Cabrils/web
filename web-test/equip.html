<!DOCTYPE html>
<html lang="ca">
<head>

<meta charset="UTF-8">
<title>Equip</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#163B65">

<link rel="manifest" href="manifest.json">

<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icona-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icona-512.png">

<link rel="apple-touch-icon" href="icona-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>

:root{
--color-clar:#00c3b2;
--color-fosc:#26545E;

--color-blanc:#ffffff;
--color-negre:#000000;

--text-sobre-fosc:var(--color-clar);
--text-sobre-clar:var(--color-fosc);
}
  
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:var(--color-fosc);
color:var(--text-sobre-fosc);
}

.app{
max-width:700px;
margin:auto;
padding:18px 16px 30px 16px;
}

.boto-tornar{
display:inline-block;
background:var(--color-blanc);
color:var(--color-fosc);
text-decoration:none;
font-weight:bold;
padding:10px 16px;
border-radius:12px;
margin-bottom:18px;
}

.titol{
text-align:center;
font-size:30px;
margin-bottom:24px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.persona{
background:var(--color-blanc);
color:var(--text-sobre-clar);
border-radius:16px;
padding:16px 10px;
text-align:center;
box-shadow:0 6px 16px rgba(0,0,0,0.2);
}

.foto{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
display:block;
margin:auto;
margin-bottom:10px;
}

.nom{
font-weight:bold;
font-size:16px;
}

.carrec{
font-size:13px;
opacity:0.8;
}

@media (max-width:520px){

.foto{
width:80px;
height:80px;
}

.nom{
font-size:15px;
}

.carrec{
font-size:12px;
}

}

</style>
</head>

<body>

<div class="app">

<a href="marta.html" class="boto-tornar">
← Tornar
</a>

<h1 class="titol">
Equip
</h1>

<div class="grid">

<div class="persona">

<img src="marta.png" class="foto">

<div class="nom">
Marta Gómez
</div>

<div class="carrec">
Candidata a l'Alcaldia
</div>

</div>

<div class="persona">

<img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="foto">

<div class="nom">
Nom membre
</div>

<div class="carrec">
Número 2
</div>

</div>

<div class="persona">

<img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="foto">

<div class="nom">
Nom membre
</div>

<div class="carrec">
Número 3
</div>

</div>

<div class="persona">

<img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="foto">

<div class="nom">
Nom membre
</div>

<div class="carrec">
Número 4
</div>

</div>

</div>

</div>

<script>

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
