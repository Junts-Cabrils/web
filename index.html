<!DOCTYPE html>
<html lang="ca">
<head>

<meta charset="UTF-8">
<title>Junts Cabrils</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icona-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icona-512.png">

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0b3a63">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#0b3a63;
  color:white;
}

.app{
  max-width:560px;
  margin:auto;
  padding:20px 16px 30px 16px;
}

.capcalera{
  text-align:center;
  margin-bottom:18px;
}

.logo{
  width:100px;
  background:white;
  padding:10px;
  border-radius:20px;
}

h1{
  margin:15px 0 5px 0;
  font-size:28px;
}

.install-wrap{
  margin:18px 0 24px 0;
  display:flex;
  justify-content:center;
}

.install-top{
  display:none;
  width:100%;
  max-width:320px;
  background:rgba(255,255,255,0.18);
  color:white;
  border:2px solid rgba(255,255,255,0.35);
  border-radius:999px;
  padding:14px 20px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 6px 16px rgba(0,0,0,0.18);
}

.columnes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.columna{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.boto{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:110px;
  background:white;
  color:#0b3a63;
  padding:14px 12px;
  border-radius:16px;
  text-decoration:none;
  font-weight:bold;
  text-align:center;
  box-shadow:0 6px 16px rgba(0,0,0,0.2);
  line-height:1.2;
}

.boto img{
  width:34px;
  margin-bottom:8px;
}

.text-petit{
  font-size:15px;
  line-height:1.2;
}

.placeholder{
  opacity:0.75;
}

.placeholder img{
  opacity:0.45;
}

@media (max-width: 520px){
  .columnes{
    gap:10px;
  }

  .columna{
    gap:10px;
  }

  .boto{
    min-height:104px;
    padding:12px 10px;
    font-size:15px;
  }

  .text-petit{
    font-size:14px;
  }
}
</style>

</head>
<body>

<div class="app">

  <div class="capcalera">
    <img src="icona-192.png" class="logo" alt="Logo Junts Cabrils">
    <h1>Junts Cabrils</h1>
  </div>

  <div class="install-wrap">
    <button id="installButton" class="install-top">Instal·la l'app</button>
  </div>

  <div class="columnes">

    <div class="columna">

      <a class="boto" href="https://junts-cabrils.github.io/web/" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/841/841364.png" alt="">
        Web
      </a>

      <a class="boto" href="https://wa.me/34676446473?text=ALTA" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="">
        <span class="text-petit">Envia "ALTA" al nostre WhatsApp</span>
      </a>

      <a class="boto" href="https://www.instagram.com/jxccabrils" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733558.png" alt="">
        Instagram
      </a>

      <a class="boto" href="https://www.facebook.com/JxCCabrils" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="">
        Facebook
      </a>

      <a class="boto" href="mailto:info@juntspercabrils.cat">
        <img src="https://cdn-icons-png.flaticon.com/512/561/561127.png" alt="">
        Correu
      </a>

    </div>

    <div class="columna">

      <a class="boto" href="marta.html">
        <img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png" alt="">
        <span class="text-petit">MARTA GÓMEZ<br>CANDIDATA A L'ALCALDIA</span>
      </a>

      <a class="boto placeholder" href="#">
        <img src="https://cdn-icons-png.flaticon.com/512/1828/1828817.png" alt="">
        Notícies
      </a>

      <a class="boto placeholder" href="#">
        <img src="https://cdn-icons-png.flaticon.com/512/747/747310.png" alt="">
        Convocatòries
      </a>

      <a class="boto placeholder" href="#">
        <img src="https://cdn-icons-png.flaticon.com/512/2983/2983788.png" alt="">
        Programa
      </a>

      <a class="boto placeholder" href="#">
        <img src="https://cdn-icons-png.flaticon.com/512/2910/2910768.png" alt="">
        Properament
      </a>

    </div>

  </div>

</div>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

let deferredPrompt;
const installButton = document.getElementById("installButton");

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installButton.style.display = "block";
});

installButton.addEventListener("click", async () => {
  if (!deferredPrompt) return;

  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;

  if (outcome === "accepted") {
    installButton.style.display = "none";
  }
});

window.addEventListener("appinstalled", () => {
  installButton.style.display = "none";
  deferredPrompt = null;
});
</script>

</body>
</html>
