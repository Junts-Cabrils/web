<style>
*{

}

body{

}

h1{

}

.install-wrap{

}

.install-top{

  width:100%;

  text-align:center;

  font-size:18px;

  box-shadow:0 6px 16px rgba(0,0,0,0.18);
}

.columnes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.columna{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.boto{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:110px;
  background:white;
  color:#0b3a63;
  padding:10px;
  border-radius:16px;
  text-decoration:none;
  font-weight:bold;
  text-align:center;
  box-shadow:0 6px 16px rgba(0,0,0,0.2);
  line-height:1.2;
  transition:transform 0.08s;
}

.boto:active{
  transform:scale(0.96);
}

.icona{
  width:48px;
  height:48px;
  border-radius:50%;
  background:rgb(22,59,101);
  display:flex;
  align-items:center;
  justify-content:center;

}

.icona img{
  width:24px;
  height:24px;
  filter:invert(1);
}
<a class="boto" href="marta.html">
  <div class="icona icona-marta">
    <img src="marta.png" alt="Marta Gómez">
  </div>

</a>
}
.icona-marta{
  width:90px;
  height:90px;
  background:none;
  overflow:hidden;
}
  .icona-marta img{
  width:100%;
  height:100%;
  object-fit:cover;

}
.text{

}

.marta{

.placeholder{

@media (max-width:520px){

</head>

<body>

  </div>

  <div class="install-wrap">
    <button id="installButton" class="install-top">Instal·la l'app</button>
  </div>

  <div class="columnes">

    <div class="columna">

      <a class="boto" href="https://www.juntspercabrils.cat" target="_blank" rel="noopener noreferrer">
        <div class="icona">
          <img src="https://cdn-icons-png.flaticon.com/512/841/841364.png" alt="Web">
        </div>
        <span class="text">WEB</span>
      </a>

      <a class="boto" href="https://wa.me/34676446473?text=ALTA" target="_blank" rel="noopener noreferrer">
        <div class="icona">
          <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
        </div>

      </a>

      <a class="boto" href="#" onclick="obreInstagram(); return false;">

      </a>

        <div class="icona">

    <div class="columna">

     <a class="boto" href="marta.html">

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

let deferredPrompt;
const installButton = document.getElementById("installButton");

const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

if (isIOS) {
  installButton.style.display = "block";
  installButton.innerHTML = "📲 iPhone:<br>Compartir →<br>Afegir a pantalla d'inici";
}

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;

  if (!isIOS) {
    installButton.style.display = "block";
    installButton.innerHTML = "Instal·la l'app";
  }
});

installButton.addEventListener("click", async () => {
  if (isIOS) {
    alert("Per instal·lar a iPhone:\n\n1. Prem Compartir\n2. Selecciona 'Afegir a pantalla d'inici'");
    return;
  }

  if (!deferredPrompt) return;

  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;

  if (outcome === "accepted") {
    installButton.style.display = "none";
  }
});

function obreInstagram() {
  window.open("https://www.instagram.com/juntspercabrils/", "_blank", "noopener,noreferrer");
}

function obreFacebook() {
  window.open("https://www.facebook.com/JuntsCabrils/", "_blank", "noopener,noreferrer");
}
</script>
