<script>

function arreglaEnllac(url){
  if(!url) return "";

  const text = String(url).trim();

  if (/^[a-zA-Z0-9_-]{20,}$/.test(text)) {
    return `https://drive.google.com/thumbnail?id=${text}&sz=w1200`;
  }

  const match = text.match(/drive\.google\.com\/file\/d\/([^/]+)/);
  if(match){
    const id = match[1];
    return `https://drive.google.com/thumbnail?id=${id}&sz=w1200`;
  }

  return text;
}

let deferredPrompt = null;

const installBar = document.getElementById("installBar");
const installText = document.getElementById("installText");
const installBtn = document.getElementById("installBtn");
const closeInstallBtn = document.getElementById("closeInstallBtn");

function esIphone(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent);
}

function esAndroid(){
  return /android/i.test(navigator.userAgent);
}

function enStandalone(){
  return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
}

function mostrarBarraInstallatge(text, mostrarBoto){
  if(enStandalone()) return;
  installText.innerHTML = text;
  installBar.style.display = "block";
  installBtn.style.display = mostrarBoto ? "inline-block" : "none";
}

window.addEventListener("beforeinstallprompt", function(e){
  e.preventDefault();
  deferredPrompt = e;

  if(esAndroid()){
    mostrarBarraInstallatge("Instal·la l’app i afegeix-la a la pantalla d’inici.", true);
  }
});

installBtn.addEventListener("click", async function(){
  if(!deferredPrompt) return;

  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBar.style.display = "none";
});

closeInstallBtn.addEventListener("click", function(){
  installBar.style.display = "none";
});

window.addEventListener("load", function(){

  if(esIphone()){
    mostrarBarraInstallatge("Per posar aquesta app a la pantalla d'inici a iPhone: prem Compartir i després 'Afegeix a pantalla d'inici'.", false);
  }
});





  
const URL_NOTICIES = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjIrH9BJexOjcXQi-VCfEvaz_Icg2xJU4eUQpiQoYCaLj6s9UxJKbT1ULJG5SGSQ/pub?output=csv";
const URL_CONVOCATORIES = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSppmvurw7sZCa1GtfZ7kF72Voudj29-SawqkXVQxUrX4yu2LmXCmGp5-naYY1mhw/pub?output=csv";

function parseCSVLine(line){
let result = [];
let current = "";
let insideQuotes = false;

for(let i = 0; i < line.length; i++){
let char = line[i];

if(char === '"'){
if(insideQuotes && line[i + 1] === '"'){
current += '"';
i++;
}else{
insideQuotes = !insideQuotes;
}
}else if(char === "," && !insideQuotes){
result.push(current);
current = "";
}else{
current += char;
}
}

result.push(current);
return result;
}

function parseCSV(text){
let lines = text.trim().split(/\r?\n/);
if(lines.length < 2) return [];

let headers = parseCSVLine(lines[0]).map(h => h.trim().toLowerCase());
let rows = [];

for(let i = 1; i < lines.length; i++){
if(!lines[i].trim()) continue;

let values = parseCSVLine(lines[i]);
let obj = {};

headers.forEach(function(header, index){
obj[header] = (values[index] || "").trim();
});

rows.push(obj);
}

return rows;
}

function textCurt(text, max){
if(!text) return "";
return text.length > max ? text.substring(0, max) + "..." : text;
}

function formatDataCatalana(data){
if(!data) return "";

const text = String(data).trim().split("T")[0];

if(/^\d{4}-\d{2}-\d{2}$/.test(text)){
const [any, mes, dia] = text.split("-");
return `${dia}-${mes}-${any}`;
}

return text;
}

function parseDateDMY(data){
if(!data) return new Date(0);

const text = String(data).trim().split("T")[0];

if(/^\d{4}-\d{2}-\d{2}$/.test(text)){
const [any, mes, dia] = text.split("-");
return new Date(Number(any), Number(mes) - 1, Number(dia));
}

if(/^\d{2}-\d{2}-\d{4}$/.test(text)){
const [dia, mes, any] = text.split("-");
return new Date(Number(any), Number(mes) - 1, Number(dia));
}

return new Date(0);
}  
 
async function carregarPreviewNoticies(){
try{
const resposta = await fetch(URL_NOTICIES, {cache:"no-store"});
const csv = await resposta.text();
let files = parseCSV(csv);

files = files.filter(f => (f.visible || "").toLowerCase() === "si");
files.sort((a, b) => parseDateDMY(b.data) - parseDateDMY(a.data));

if(files.length === 0){
document.getElementById("preview-noticies").textContent = "No hi ha notícies.";
return;
}

let html = "";

files.slice(0,4).forEach(function(item){

html +=
'<span class="mini-titol">' + (item.titol || '') + '</span>' +
'<span class="mini-text">' + textCurt(item.text || '', 55) + '</span><br>';

});

document.getElementById("preview-noticies").innerHTML = html;

}catch(error){
document.getElementById("preview-noticies").textContent = "No s'ha pogut carregar la notícia.";
console.error(error);
}
}

async function carregarPreviewConvocatories(){
try{
const resposta = await fetch(URL_CONVOCATORIES, {cache:"no-store"});
const csv = await resposta.text();
let files = parseCSV(csv);

files = files.filter(f => (f.visible || "").toLowerCase() === "si");

const avui = new Date();
avui.setHours(0,0,0,0);

files = files.filter(f => {
const d = parseDateDMY(f.data);
d.setHours(0,0,0,0);
return d >= avui;
});

files.sort((a, b) => parseDateDMY(a.data) - parseDateDMY(b.data));

if(files.length === 0){
document.getElementById("preview-convocatories").textContent = "No hi ha convocatòries.";
return;
}

let html = "";

files.slice(0,4).forEach(function(item){

let resum = [formatDataCatalana(item.data), item.hora, item.lloc].filter(Boolean).join(" · ");
if(!resum) resum = item.text || "";

html +=
'<span class="mini-titol">' + (item.titol || '') + '</span>' +
'<span class="mini-text">' + textCurt(resum, 55) + '</span><br>';

});

document.getElementById("preview-convocatories").innerHTML = html;

}catch(error){
document.getElementById("preview-convocatories").textContent = "No s'ha pogut carregar la convocatòria.";
console.error(error);
}
}

carregarPreviewNoticies();
carregarPreviewConvocatories();
