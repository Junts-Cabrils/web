<style>

:root{
--color-fons:#163B65;
--color-caixa:white;
--color-text:#0b3a63;
--color-icona-fons:#163B65;
--color-icona:white;
--color-youtube:#FF0000;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:var(--color-fons);
color:white;
}

.app{
max-width:560px;
margin:auto;
padding:20px 16px 30px 16px;
}

.capcalera{
text-align:center;
margin-bottom:18px;
}

.logo{
width:100px;
background:white;
padding:10px;
border-radius:20px;
}

h1{
margin:15px 0 5px 0;
font-size:28px;
}

.columnes{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
align-items:start;
}

.columna{
display:flex;
flex-direction:column;
gap:14px;
}

.boto{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:110px;
background:var(--color-caixa);
color:var(--color-text);
padding:10px;
border-radius:16px;
text-decoration:none;
font-weight:bold;
text-align:center;
box-shadow:0 6px 16px rgba(0,0,0,0.2);
line-height:1.2;
}

.boto:active{
transform:scale(0.96);
}

.boto-marta{
height:234px;
justify-content:flex-start;
padding-top:30px;
padding-bottom:14px;
}

.icona{
width:48px;
height:48px;
border-radius:50%;
background:var(--color-icona-fons);
color:var(--color-icona);
display:flex;
align-items:center;
justify-content:center;
margin-bottom:8px;
overflow:hidden;
}

svg{
width:24px;
height:24px;
stroke:currentColor;
fill:none;
stroke-width:2;
stroke-linecap:round;
stroke-linejoin:round;
}

.icona-marta{
width:120px;
height:120px;
border-radius:50%;
overflow:hidden;
margin-bottom:12px;
}

.icona-marta img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.text{
font-size:14px;
}

.text-marta{
font-size:14px;
line-height:1.35;
}

.boto-noticies{
height:172px !important;
align-items:center;
justify-content:flex-start;
padding-top:16px;
padding-bottom:14px;
overflow:hidden;
}

.text-noticies{
width:100%;
font-size:12px;
line-height:1.2;
}

.titol-boto{
font-size:14px;
font-weight:bold;
margin-bottom:10px;
}

#preview-noticies,
#preview-convocatories{
display:block;
width:100%;
font-weight:normal;
font-size:12px;
line-height:1.25;
color:#444;
}

#preview-noticies{
margin-bottom:10px;
padding-bottom:10px;
border-bottom:1px solid #ddd;
}

.mini-titol{
display:block;
font-weight:bold;
margin-bottom:3px;
color:#0b3a63;
}

.mini-text{
display:block;
color:#555;
}

.boto-youtube .icona{
background:var(--color-youtube);
}

@media (max-width:520px){

.boto{
height:100px;
}

.boto-noticies{
height:158px !important;
padding-top:14px;
}

.boto-marta{
height:214px;
padding-top:16px;
}

.text{
font-size:13px;
}

.text-marta{
font-size:13px;
}

.icona{
width:42px;
height:42px;
}

svg{
width:20px;
height:20px;
}

.icona-marta{
width:104px;
height:104px;
margin-bottom:10px;
}

}

</style>
