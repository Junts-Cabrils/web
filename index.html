<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:rgb(22,59,101);
color:white;
}

.app{
max-width:560px;
margin:auto;
padding:20px 16px 30px 16px;
}

.capcalera{
text-align:center;
margin-bottom:18px;
}

.logo{
width:100px;
background:white;
padding:10px;
border-radius:20px;
}

h1{
margin:15px 0 5px 0;
font-size:28px;
}

.install-wrap{
margin:18px 0 24px 0;
display:flex;
justify-content:center;
}

.install-top{
display:none;
width:100%;
max-width:320px;
background:rgba(255,255,255,0.18);
color:white;
border:2px solid rgba(255,255,255,0.35);
border-radius:999px;
padding:14px 20px;
text-align:center;
font-weight:bold;
font-size:18px;
cursor:pointer;
box-shadow:0 6px 16px rgba(0,0,0,0.18);
}

.columnes{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
align-items:start;
}

.columna{
display:flex;
flex-direction:column;
gap:14px;
}

.boto{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:110px;
background:white;
color:#0b3a63;
padding:10px;
border-radius:16px;
text-decoration:none;
font-weight:bold;
text-align:center;
box-shadow:0 6px 16px rgba(0,0,0,0.2);
line-height:1.2;
transition:transform 0.08s;
}

.boto:active{
transform:scale(0.96);
}

.boto-marta{
height:234px;
justify-content:flex-start;
padding-top:18px;
padding-bottom:14px;
}

.icona{
width:48px;
height:48px;
border-radius:50%;
background:rgb(22,59,101);
display:flex;
align-items:center;
justify-content:center;
margin-bottom:8px;
overflow:hidden;
flex-shrink:0;
color:white; 
}

.icona img{
  width:24px;
  height:24px;
}
.icona i,
.icona svg{
  color:white;
  fill:white;
  font-size:26px;
}
  
.icona-marta{
width:120px;
height:120px;
background:none;
margin-bottom:12px;
border-radius:50%;
overflow:hidden;
}

.icona-marta img{
width:100%;
height:100%;
object-fit:cover;
filter:none;
display:block;
}

.text{
font-size:14px;
}

.text-marta{
font-size:14px;
line-height:1.15;
}

.boto-youtube .icona{
background:#FF0000;
}

.boto-youtube .icona img{
filter:none;
}

@media (max-width:520px){

.boto{
height:100px;
}

.boto-marta{
height:214px;
padding-top:16px;
}

.text{
font-size:13px;
}

.text-marta{
font-size:13px;
}

.icona{
width:42px;
height:42px;
}

.icona img{
width:20px;
height:20px;
}

.icona-marta{
width:104px;
height:104px;
margin-bottom:10px;
}

}
