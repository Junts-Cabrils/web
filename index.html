  <style>
    /* El teu CSS es manté exactament igual, és correcte */
    :root{ --color-clar:#00c3b2; --color-fosc:#26545E; --color-blanc:#ffffff; --color-negre:#000000; --text-sobre-fosc:var(--color-clar); --text-sobre-clar:var(--color-fosc); --icon-fons:var(--color-fosc); --icon-color:var(--color-blanc); }
    *{ box-sizing:border-box; }
    .install-bar{ position:fixed; left:12px; right:12px; bottom:12px; background:#ffffff; color:#26545E; border-radius:16px; padding:14px 14px 12px 14px; box-shadow:0 8px 24px rgba(0,0,0,0.25); z-index:9999; display:none; }
    .install-text{ font-size:14px; line-height:1.35; margin-bottom:10px; }
    .install-actions{ display:flex; gap:10px; flex-wrap:wrap; }
    .install-btn{ border:none; border-radius:12px; padding:10px 14px; font-weight:bold; font-size:14px; cursor:pointer; }
    .install-btn-primary{ background:#26545E; color:#ffffff; }
    .install-btn-secondary{ background:#e9eeee; color:#26545E; }
    body{ margin:0; font-family:Arial, Helvetica, sans-serif; background:var(--color-fosc); color:var(--text-sobre-fosc); }
    .app{ max-width:560px; margin:auto; padding:0px 16px 10px 16px; }
    .capcalera{ text-align:center; margin-bottom:2px; }
    .logo{ width:240px; background:transparent; padding:0; border:none; border-radius:20px; display:block; margin:0 auto 0 auto; }
    h1{ margin:-6px 0 0 0; line-height:1.05; }
    .columnes{ display:grid; grid-template-columns:1fr 1fr; gap:14px; align-items:start; }
    .columna{ display:flex; flex-direction:column; gap:14px; }
    .boto{ display:flex; flex-direction:column; align-items:center; justify-content:center; height:110px; background:var(--color-blanc); color:var(--text-sobre-clar); padding:10px; border-radius:16px; text-decoration:none; font-weight:bold; text-align:center; box-shadow:0 6px 16px rgba(0,0,0,0.2); line-height:1.2; }
    .boto:active{ transform:scale(0.96); }
    .boto-marta{ height:234px; justify-content:flex-start; padding-top:30px; padding-bottom:14px; }
    .icona{ width:48px; height:48px; border-radius:50%; background:var(--icon-fons); color:var(--icon-color); display:flex; align-items:center; justify-content:center; margin-bottom:8px; overflow:hidden; }
    svg{ width:24px; height:24px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .icona-marta{ width:120px; height:120px; border-radius:50%; overflow:hidden; margin-bottom:12px; }
    .icona-marta img{ width:100%; height:100%; object-fit:cover; display:block; }
    .text{ font-size:14px; }
    .text-marta{ font-size:14px; line-height:1.35; }
    .boto-noticies{ height:172px !important; align-items:center; justify-content:flex-start; padding-top:16px; padding-bottom:14px; overflow:hidden; }
    .text-noticies{ width:100%; font-size:12px; line-height:1.2; }
    .titol-boto{ font-size:14px; font-weight:bold; margin-bottom:10px; }
    #preview-noticies, #preview-convocatories{ display:block; width:100%; font-weight:normal; font-size:12px; line-height:1.25; color:var(--text-sobre-clar); }
    #preview-noticies{ margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid #ddd; }
    .mini-titol{ display:block; font-weight:bold; margin-bottom:3px; color:var(--color-fosc); }
    .mini-text{ display:block; color:#555; }
    @media (max-width:520px){ .logo{ width:140px; } .boto{ height:100px; } .boto-noticies{ height:158px !important; padding-top:14px; } .boto-marta{ height:214px; padding-top:16px; } .text{ font-size:13px; } .text-marta{ font-size:13px; } .icona{ width:42px; height:42px; } svg{ width:20px; height:20px; } .icona-marta{ width:104px; height:104px; margin-bottom:10px; } }
  </style>

<body>
  <div class="app">
    <div class="capcalera">

    </div>

    <div class="columnes">
      <div class="columna">
        <a class="boto" href="#" onclick="obrirWeb(); return false;">
          <div class="icona"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="3" y1="12" x2="21" y2="12"/></svg></div>

        <a class="boto" href="#" onclick="enviarWhatsApp(); return false;">

        <a class="boto" href="#" onclick="obrirFacebook(); return false;">
          <div class="icona"><svg viewBox="0 0 24 24"><path d="M13 22v-8h3l1-4h-4V7c0-1 .4-2 2-2h2V1h-3c-4 0-6 2-6 5v4H5v4h3v8z"/></svg></div>
          <span class="text">FACEBOOK</span>

        <a class="boto" href="#" onclick="obrirYoutube(); return false;">
          <div class="icona"><svg viewBox="0 0 24 24" fill="white" stroke="none"><polygon points="6,5 19,12 6,19"/></svg></div>
          <span class="text">YOUTUBE</span>

        <a class="boto" href="#" onclick="enviarEmail(); return false;">
          <div class="icona"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3,7 12,13 21,7"/></svg></div>
          <span class="text">CORREU</span>
        </a>
      </div>

      <div class="columna">
        <a class="boto boto-marta" href="marta.html">
          <div class="icona-marta"><img src="marta.png"></div>
          <span class="text-marta">MARTA GÓMEZ<br>Candidata a l'Alcaldia</span>
        </a>

        <a class="boto boto-noticies" href="noticies.html">
          <div class="text text-noticies">
            <div class="titol-boto">NOTÍCIES</div>

        <a class="boto boto-noticies" href="convocatories.html">
          <div class="text text-noticies">

  <div id="installBar" class="install-bar">
    <div id="installText" class="install-text"></div>
    <div class="install-actions">
      <button id="installBtn" class="install-btn install-btn-primary" style="display:none;">Instal·la l'app</button>
      <button id="closeInstallBtn" class="install-btn install-btn-secondary">Tanca</button>
    </div>

  <script>
    // Tots els teus scripts de Google Sheets, PWA i Trackers
    const URL_NOTICIES = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjIrH9BJexOjcXQi-VCfEvaz_Icg2xJU4eUQpiQoYCaLj6s9UxJKbT1ULJG5SGSQ/pub?output=csv";
    const URL_CONVOCATORIES = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSppmvurw7sZCa1GtfZ7kF72Voudj29-SawqkXVQxUrX4yu2LmXCmGp5-naYY1mhw/pub?output=csv";

    function parseCSVLine(line){ let result = []; let current = ""; let insideQuotes = false; for(let i = 0; i < line.length; i++){ let char = line[i]; if(char === '"'){ if(insideQuotes && line[i + 1] === '"'){ current += '"'; i++; }else{ insideQuotes = !insideQuotes; } }else if(char === "," && !insideQuotes){ result.push(current); current = ""; }else{ current += char; } } result.push(current); return result; }
    function parseCSV(text){ let lines = text.trim().split(/\r?\n/); if(lines.length < 2) return []; let headers = parseCSVLine(lines[0]).map(h => h.trim().toLowerCase()); let rows = []; for(let i = 1; i < lines.length; i++){ if(!lines[i].trim()) continue; let values = parseCSVLine(lines[i]); let obj = {}; headers.forEach(function(header, index){ obj[header] = (values[index] || "").trim(); }); rows.push(obj); } return rows; }
    function textCurt(text, max){ if(!text) return ""; return text.length > max ? text.substring(0, max) + "..." : text; }
    function formatDataCatalana(data){ if(!data) return ""; const text = String(data).trim().split("T")[0]; if(/^\d{4}-\d{2}-\d{2}$/.test(text)){ const [any, mes, dia] = text.split("-"); return `${dia}-${mes}-${any}`; } return text; }
    function parseDateDMY(data){ if(!data) return new Date(0); const text = String(data).trim().split("T")[0]; if(/^\d{4}-\d{2}-\d{2}$/.test(text)){ const [any, mes, dia] = text.split("-"); return new Date(Number(any), Number(mes) - 1, Number(dia)); } if(/^\d{2}-\d{2}-\d{4}$/.test(text)){ const [dia, mes, any] = text.split("-"); return new Date(Number(any), Number(mes) - 1, Number(dia)); } return new Date(0); }

    async function carregarPreviewNoticies(){ try{ const resposta = await fetch(URL_NOTICIES, {cache:"no-store"}); const csv = await resposta.text(); let files = parseCSV(csv); files = files.filter(f => (f.visible || "").toLowerCase() === "si"); files.sort((a, b) => parseDateDMY(b.data) - parseDateDMY(a.data)); if(files.length === 0){ document.getElementById("preview-noticies").textContent = "No hi ha notícies."; return; } let html = ""; files.slice(0,4).forEach(function(item){ html += '<span class="mini-titol">' + (item.titol || '') + '</span>' + '<span class="mini-text">' + textCurt(item.text || '', 55) + '</span><br>'; }); document.getElementById("preview-noticies").innerHTML = html; }catch(error){ document.getElementById("preview-noticies").textContent = "Error al carregar."; } }
    async function carregarPreviewConvocatories(){ try{ const resposta = await fetch(URL_CONVOCATORIES, {cache:"no-store"}); const csv = await resposta.text(); let files = parseCSV(csv); files = files.filter(f => (f.visible || "").toLowerCase() === "si"); const avui = new Date(); avui.setHours(0,0,0,0); files = files.filter(f => { const d = parseDateDMY(f.data); d.setHours(0,0,0,0); return d >= avui; }); files.sort((a, b) => parseDateDMY(a.data) - parseDateDMY(b.data)); if(files.length === 0){ document.getElementById("preview-convocatories").textContent = "No hi ha actes pendents."; return; } let html = ""; files.slice(0,4).forEach(function(item){ let resum = [formatDataCatalana(item.data), item.hora, item.lloc].filter(Boolean).join(" · "); html += '<span class="mini-titol">' + (item.titol || '') + '</span>' + '<span class="mini-text">' + textCurt(resum, 55) + '</span><br>'; }); document.getElementById("preview-convocatories").innerHTML = html; }catch(error){ document.getElementById("preview-convocatories").textContent = "Error al carregar."; } }

    carregarPreviewNoticies();
    carregarPreviewConvocatories();

    // Lògica d'instal·lació PWA
    if ("serviceWorker" in navigator) { navigator.serviceWorker.register("sw.js"); }
    let deferredPrompt = null;
    const installBar = document.getElementById("installBar");
    function esIphone(){ return /iphone|ipad|ipod/i.test(navigator.userAgent); }
    function enStandalone(){ return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true; }
    window.addEventListener("beforeinstallprompt", (e) => { e.preventDefault(); deferredPrompt = e; if(!enStandalone() && !esIphone()){ installBar.style.display = "block"; document.getElementById("installBtn").style.display = "inline-block"; document.getElementById("installText").innerText = "Instal·la l’app per a una millor experiència."; } });
    document.getElementById("installBtn").addEventListener("click", async () => { if(deferredPrompt){ deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; installBar.style.display = "none"; } });
    document.getElementById("closeInstallBtn").addEventListener("click", () => installBar.style.display = "none");
    window.addEventListener("load", () => { if(esIphone() && !enStandalone()){ installBar.style.display = "block"; document.getElementById("installText").innerText = "A iPhone: prem 'Compartir' i després 'Afegeix a pantalla d'inici'."; } });

    // Funcions de navegació i esdeveniments
    function trackEvent(nom, dades = {}) { if (typeof gtag === 'function') gtag('event', nom, dades); }
    function obrirWeb(){ trackEvent('click_web'); setTimeout(() => window.open('https://www.juntspercabrils.cat','_blank'), 120); }
    function enviarWhatsApp(){ trackEvent('click_whatsapp'); setTimeout(() => window.open('https://wa.me/34676446473?text=ALTA','_blank'), 120); }
    function obreInstagram(){ trackEvent('click_instagram'); window.location = "instagram://user?username=juntspercabrils"; setTimeout(() => window.location = "https://instagram.com/juntspercabrils", 1200); }
    function obrirFacebook(){ trackEvent('click_facebook'); setTimeout(() => window.open('https://facebook.com/JuntsCabrils/','_blank'), 120); }
    function obrirYoutube(){ trackEvent('click_youtube'); setTimeout(() => window.open('https://youtube.com/@JuntsperCabrils','_blank'), 120); }
    function enviarEmail(){ trackEvent('click_email'); setTimeout(() => window.location.href = 'mailto:info@juntspercabrils.cat', 120); }
  </script>
