<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Junts Cabrils</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#163B65">
  <meta name="robots" content="noindex">

  <link rel="manifest" href="manifest.json">

  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icona-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icona-512.png">

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#163B65;
      color:#163B65;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .container{
      max-width:900px;
      margin:0 auto;
      padding:16px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    .tile{
      background:#fff;
      border-radius:28px;
      min-height:220px;
      padding:22px 18px;
      box-shadow:0 6px 18px rgba(0,0,0,0.14);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      transition:transform 0.15s ease, box-shadow 0.15s ease;
    }

    .tile:active{
      transform:scale(0.99);
    }

    .tile:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 24px rgba(0,0,0,0.16);
    }

    .tile.double{
      grid-row:span 2;
      min-height:456px;
      justify-content:flex-start;
      padding-top:34px;
    }

    .tile-icon-circle{
      width:92px;
      height:92px;
      border-radius:50%;
      background:#163B65;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:18px;
      overflow:hidden;
      flex-shrink:0;
    }

    .tile-icon-circle img{
      width:44px;
      height:44px;
      object-fit:contain;
      display:block;
    }

    .tile-label{
      font-size:28px;
      font-weight:800;
      line-height:1.15;
      margin:0;
      color:#163B65;
    }

    .tile-sub{
      font-size:18px;
      line-height:1.25;
      margin:6px 0 0 0;
      font-weight:700;
      color:#163B65;
    }

    .marta-photo{
      width:220px;
      height:220px;
      border-radius:50%;
      object-fit:cover;
      display:block;
      margin:0 auto 26px auto;
      background:#eaeaea;
    }

    .preview-tile{
      background:#fff;
      border-radius:28px;
      min-height:220px;
      padding:22px 20px;
      box-shadow:0 6px 18px rgba(0,0,0,0.14);
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      text-align:center;
      color:#163B65;
      transition:transform 0.15s ease, box-shadow 0.15s ease;
    }

    .preview-tile:active{
      transform:scale(0.99);
    }

    .preview-tile:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 24px rgba(0,0,0,0.16);
    }

    .preview-heading{
      margin:0 0 16px 0;
      font-size:28px;
      line-height:1.1;
      font-weight:800;
      color:#163B65;
    }

    .preview-content{
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      align-items:center;
      gap:10px;
      flex:1;
    }

    .preview-title{
      margin:0;
      font-size:18px;
      line-height:1.22;
      font-weight:800;
      color:#163B65;
      word-break:break-word;
    }

    .preview-text{
      margin:0;
      font-size:16px;
      line-height:1.35;
      color:#4b4b4b;
      word-break:break-word;
    }

    .preview-date{
      margin-top:auto;
      padding-top:10px;
      font-size:16px;
      line-height:1.2;
      color:#666;
    }

    .loading{
      font-size:18px;
      color:#666;
    }

    @media (max-width: 700px){
      .container{
        padding:14px;
      }

      .grid{
        gap:14px;
      }

      .tile,
      .preview-tile{
        min-height:190px;
        border-radius:24px;
      }

      .tile.double{
        min-height:394px;
        padding-top:26px;
      }

      .tile-icon-circle{
        width:82px;
        height:82px;
        margin-bottom:16px;
      }

      .tile-icon-circle img{
        width:40px;
        height:40px;
      }

      .marta-photo{
        width:170px;
        height:170px;
        margin-bottom:22px;
      }

      .tile-label,
      .preview-heading{
        font-size:24px;
      }

      .tile-sub{
        font-size:16px;
      }

      .preview-title{
        font-size:16px;
      }

      .preview-text,
      .preview-date{
        font-size:15px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="grid">

      <a class="tile" href="https://junts-cabrils.github.io/web/" target="_blank" rel="noopener noreferrer">
        <div class="tile-icon-circle">
          <img src="https://cdn.jsdelivr.net/gh/tabler/tabler-icons/icons/world.svg" alt="Web">
        </div>
        <p class="tile-label">WEB</p>
      </a>

      <a class="tile double" href="marta.html">
        <img class="marta-photo" src="marta.png" alt="Marta Gómez" onerror="this.style.display='none'">
        <p class="tile-label">MARTA GÓMEZ</p>
        <p class="tile-sub">Candidata a l'Alcaldia</p>
      </a>

      <a class="tile" href="https://wa.me/34676446473?text=ALTA" target="_blank" rel="noopener noreferrer">
        <div class="tile-icon-circle">
          <img src="https://cdn.jsdelivr.net/gh/tabler/tabler-icons/icons/brand-whatsapp.svg" alt="WhatsApp">
        </div>
        <p class="tile-label">WHATSAPP</p>
        <p class="tile-sub">ENVIA "ALTA"</p>
      </a>

      <a class="tile" href="https://www.instagram.com/juntspercabrils/" target="_blank" rel="noopener noreferrer">
        <div class="tile-icon-circle">
          <img src="https://cdn.jsdelivr.net/gh/tabler/tabler-icons/icons/brand-instagram.svg" alt="Instagram">
        </div>
        <p class="tile-label">INSTAGRAM</p>
      </a>

      <a class="preview-tile" id="preview-noticia" href="noticies.html">
        <p class="loading">Carregant notícies...</p>
      </a>

      <a class="tile" href="https://www.facebook.com/JuntsCabrils/" target="_blank" rel="noopener noreferrer">
        <div class="tile-icon-circle">
          <img src="https://cdn.jsdelivr.net/gh/tabler/tabler-icons/icons/brand-facebook.svg" alt="Facebook">
        </div>
        <p class="tile-label">FACEBOOK</p>
      </a>

      <a class="preview-tile" id="preview-agenda" href="convocatories.html">
        <p class="loading">Carregant agenda...</p>
      </a>

      <a class="tile" href="https://www.youtube.com/@JuntsperCabrils" target="_blank" rel="noopener noreferrer">
        <div class="tile-icon-circle" style="background:#ff0000;">
          <img src="https://cdn.jsdelivr.net/gh/tabler/tabler-icons/icons/brand-youtube.svg" alt="YouTube">
        </div>
        <p class="tile-label">YOUTUBE</p>
      </a>

      <a class="tile" href="mailto:info@juntspercabrils.cat">
        <div class="tile-icon-circle">
          <img src="https://cdn.jsdelivr.net/gh/tabler/tabler-icons/icons/mail.svg" alt="Correu">
        </div>
        <p class="tile-label">CORREU</p>
      </a>

      <a class="tile" href="informacio.html">
        <div class="tile-icon-circle">
          <img src="https://cdn.jsdelivr.net/gh/tabler/tabler-icons/icons/map-pin.svg" alt="Informació local">
        </div>
        <p class="tile-label">INFORMACIÓ LOCAL</p>
      </a>

    </div>
  </div>

  <script>
    const URL_NOTICIES = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjIrH9BJexOjcXQi-VCfEvaz_Icg2xJU4eUQpiQoYCaLj6s9UxJKbT1ULJG5SGSQ/pub?output=csv";
    const URL_AGENDA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSppmvurw7sZCa1GtfZ7kF72Voudj29-SawqkXVQxUrX4yu2LmXCmGp5-naYY1mhw/pub?output=csv";

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          row.push(current);
          current = "";
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && next === '\n') i++;
          row.push(current);
          if (row.some(cell => cell.trim() !== "")) rows.push(row);
          row = [];
          current = "";
        } else {
          current += char;
        }
      }

      if (current.length > 0 || row.length > 0) {
        row.push(current);
        if (row.some(cell => cell.trim() !== "")) rows.push(row);
      }

      return rows;
    }

    function csvToObjects(csvText) {
      const rows = parseCSV(csvText);
      if (!rows.length) return [];

      const headers = rows[0].map(h => h.trim().toLowerCase());

      return rows.slice(1).map(row => {
        const obj = {};
        headers.forEach((header, index) => {
          obj[header] = (row[index] || "").trim();
        });
        return obj;
      });
    }

    function parseDateDMY(str) {
      if (!str) return new Date(0);

      const s = str.trim();

      if (/^\d{2}-\d{2}-\d{4}$/.test(s)) {
        const [d, m, y] = s.split("-");
        return new Date(Number(y), Number(m) - 1, Number(d));
      }

      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
        const [y, m, d] = s.split("-");
        return new Date(Number(y), Number(m) - 1, Number(d));
      }

      return new Date(s);
    }

    function visibles(items) {
      return items.filter(item => (item.visible || "").trim().toLowerCase() === "si");
    }

    function renderPreviewNoticia(item) {
      const box = document.getElementById("preview-noticia");
      if (!box) return;

      const titol = item.titol || "";
      const text = item.text || "";

      box.innerHTML = `
        <h2 class="preview-heading">NOTÍCIES</h2>
        <div class="preview-content">
          ${titol ? `<p class="preview-title">${escapeHtml(titol)}</p>` : ""}
          ${text ? `<p class="preview-text">${escapeHtml(text)}</p>` : ""}
        </div>
      `;
    }

    function renderPreviewAgenda(item) {
      const box = document.getElementById("preview-agenda");
      if (!box) return;

      const titol = item.titol || "";
      const text = item.text || "";
      const data = item.data || "";

      box.innerHTML = `
        <h2 class="preview-heading">AGENDA</h2>
        <div class="preview-content">
          ${titol ? `<p class="preview-title">${escapeHtml(titol)}</p>` : ""}
          ${text ? `<p class="preview-text">${escapeHtml(text)}</p>` : ""}
          ${data ? `<p class="preview-date">${escapeHtml(data)}</p>` : ""}
        </div>
      `;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function carregaNoticiaPortada() {
      try {
        const res = await fetch(URL_NOTICIES);
        const csv = await res.text();
        const items = visibles(csvToObjects(csv))
          .sort((a, b) => parseDateDMY(b.data) - parseDateDMY(a.data));

        if (items.length) {
          renderPreviewNoticia(items[0]);
        } else {
          document.getElementById("preview-noticia").innerHTML = `
            <h2 class="preview-heading">NOTÍCIES</h2>
            <div class="preview-content">
              <p class="preview-text">No hi ha notícies disponibles.</p>
            </div>
          `;
        }
      } catch (e) {
        document.getElementById("preview-noticia").innerHTML = `
          <h2 class="preview-heading">NOTÍCIES</h2>
          <div class="preview-content">
            <p class="preview-text">No s'han pogut carregar les notícies.</p>
          </div>
        `;
      }
    }

    async function carregaAgendaPortada() {
      try {
        const res = await fetch(URL_AGENDA);
        const csv = await res.text();
        const items = visibles(csvToObjects(csv))
          .sort((a, b) => parseDateDMY(a.data) - parseDateDMY(b.data));

        if (items.length) {
          renderPreviewAgenda(items[0]);
        } else {
          document.getElementById("preview-agenda").innerHTML = `
            <h2 class="preview-heading">AGENDA</h2>
            <div class="preview-content">
              <p class="preview-text">No hi ha convocatòries disponibles.</p>
            </div>
          `;
        }
      } catch (e) {
        document.getElementById("preview-agenda").innerHTML = `
          <h2 class="preview-heading">AGENDA</h2>
          <div class="preview-content">
            <p class="preview-text">No s'ha pogut carregar l'agenda.</p>
          </div>
        `;
      }
    }

    carregaNoticiaPortada();
    carregaAgendaPortada();
  </script>
</body>
</html>
