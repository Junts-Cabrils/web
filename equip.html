<style>

:root{
--color-clar:#00c3b2;
--color-fosc:#26545E;

--color-blanc:#ffffff;
--color-negre:#000000;

--text-sobre-fosc:var(--color-clar);
--text-sobre-clar:var(--color-fosc);
}
  
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:var(--color-fosc);
color:var(--text-sobre-fosc);
}

.app{
max-width:700px;
margin:auto;
padding:18px 16px 30px 16px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.persona{
background:var(--color-blanc);
color:var(--text-sobre-clar);
border-radius:16px;
padding:16px 10px;
text-align:center;
box-shadow:0 6px 16px rgba(0,0,0,0.2);
}

.foto{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
display:block;
margin:auto;
margin-bottom:10px;
}

.nom{
font-weight:bold;
font-size:16px;
}

.carrec{
font-size:13px;
opacity:0.8;
}
.barra-superior{
display:flex;
align-items:center;
gap:12px;
padding:10px 14px;
background:var(--color-fosc);
color:var(--color-blanc);
position:sticky;
top:0;
z-index:1000;
}

.boto-tornar{
color:var(--color-blanc);
text-decoration:none;
font-size:24px;
font-weight:bold;
line-height:1;
display:inline-block;
padding:2px 4px;
background:none;
border-radius:0;
margin:0;
}

.titol-pagina{
font-size:18px;
font-weight:bold;
letter-spacing:0.3px;
color:var(--color-blanc);
}



  
@media (max-width:520px){

.foto{
width:80px;
height:80px;
}

.nom{
font-size:15px;
}

.carrec{
font-size:12px;
}

}

</style>
</head>

<body>

<div class="app">
