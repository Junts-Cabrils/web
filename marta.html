*{

body{
margin:0;

background:var(--color-fons);

}

.app{
max-width:700px;

.cap{

.foto{

h1{

.subtitol{

}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:30px;
}

.caixa{
background:white;
color:var(--color-text);
border-radius:16px;
padding:16px;
text-align:center;
font-weight:bold;
text-decoration:none;
min-height:118px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
line-height:1.2;
box-shadow:0 6px 16px rgba(0,0,0,0.2);
}

.icona{
width:48px;
height:48px;
border-radius:50%;
background:var(--color-icona-fons);
color:var(--color-icona);
display:flex;
align-items:center;
justify-content:center;
margin-bottom:10px;
}

svg{
width:24px;
height:24px;
stroke:currentColor;
fill:none;
stroke-width:2;
stroke-linecap:round;
stroke-linejoin:round;
}

@media (max-width:520px){

.foto{
width:150px;
height:150px;
}

h1{
font-size:30px;
}

.subtitol{
font-size:21px;
}

.caixa{
min-height:108px;
}

}

.barra-superior{
display:flex;
align-items:center;
gap:12px;
padding:10px 14px;
background:#163B65;
color:white;
position:sticky;
top:0;
z-index:1000;
}

.boto-tornar{
color:white;
text-decoration:none;
font-size:24px;
font-weight:bold;
line-height:1;
display:inline-block;
padding:2px 4px;
}

.titol-pagina{

letter-spacing:0.3px;
