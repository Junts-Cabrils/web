<!DOCTYPE html>
<html lang="ca">
<head>

<meta charset="UTF-8">
<title>Marta Gómez</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#163B65">

<link rel="manifest" href="manifest.json">

<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icona-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icona-512.png">

<link rel="apple-touch-icon" href="icona-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:rgb(22,59,101);
color:white;
}

.app{
max-width:700px;
margin:auto;
padding:18px 16px 30px 16px;
}

.boto-tornar{
display:inline-block;
background:white;
color:#163B65;
text-decoration:none;
font-weight:bold;
padding:10px 16px;
border-radius:12px;
margin-bottom:18px;
}

.cap-marta{
text-align:center;
margin-bottom:22px;
}

.foto-marta-gran{
width:170px;
height:170px;
border-radius:50%;
object-fit:cover;
display:block;
margin:0 auto 14px auto;
border:4px solid rgba(255,255,255,0.18);
background:white;
}

.nom{
margin:0 0 6px 0;
font-size:30px;
line-height:1.1;
}

.subtitol{
margin:0;
font-size:18px;
font-weight:bold;
opacity:0.95;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:12px;
}

.caixa{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:118px;
background:white;
color:#0b3a63;
text-decoration:none;
text-align:center;
border-radius:16px;
padding:14px 10px;
font-weight:bold;
box-shadow:0 6px 16px rgba(0,0,0,0.2);
line-height:1.2;
}

.caixa:active{
transform:scale(0.97);
}

.icona{
width:50px;
height:50px;
border-radius:50%;
background:rgb(22,59,101);
display:flex;
align-items:center;
justify-content:center;
margin-bottom:10px;
overflow:hidden;
}

.icona img{
width:24px;
height:24px;
filter:invert(1);
}

.text{
font-size:14px;
}

@media (max-width:520px){

.foto-marta-gran{
width:150px;
height:150px;
}

.nom{
font-size:26px;
}

.subtitol{
font-size:16px;
}

.grid{
grid-template-columns:1fr 1fr;
gap:12px;
}

.caixa{
min-height:108px;
padding:12px 8px;
}

.icona{
width:44px;
height:44px;
margin-bottom:8px;
}

.icona img{
width:20px;
height:20px;
}

.text{
font-size:13px;
}

}

</style>
</head>

<body>

<div class="app">

<a href="index.html" class="boto-tornar">
← Tornar
</a>

<div class="cap-marta">

<img src="marta.png"
alt="Marta Gómez"
class="foto-marta-gran">

<h1 class="nom">
Marta Gómez
</h1>

<p class="subtitol">
Candidata a l'Alcaldia
</p>

</div>

<div class="grid">

<a class="caixa" href="presentacio.html">

<div class="icona">
<img src="https://cdn-icons-png.flaticon.com/512/2910/2910768.png">
</div>

<span class="text">
PRESENTACIÓ
</span>

</a>

<a class="caixa" href="programa.html">

<div class="icona">
<img src="https://cdn-icons-png.flaticon.com/512/1048/1048941.png">
</div>

<span class="text">
PROGRAMA
</span>

</a>

<a class="caixa" href="mailto:info@juntspercabrils.cat">

<div class="icona">
<img src="https://cdn-icons-png.flaticon.com/512/561/561127.png">
</div>

<span class="text">
CONTACTE
</span>

</a>

</div>

</div>

<script>

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
