<!DOCTYPE html>

<html lang="ca">

<head>

<meta charset="UTF-8">

<title>Notícies</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

.barra-superior{
display:flex;
align-items:center;
gap:12px;
padding:10px 14px;
background:#163B65;
color:white;
position:sticky;
top:0;
z-index:1000;
}

.boto-tornar{
color:white;
text-decoration:none;
font-size:24px;
font-weight:bold;
line-height:1;
display:inline-block;
padding:2px 4px;
}
.titol-pagina{
font-size:18px;
font-weight:bold;
letter-spacing:0.3px;
}
  
body{

margin:0;

font-family:Arial, Helvetica, sans-serif;

background:#163B65;

color:white;

}

.app{

max-width:700px;

margin:auto;

padding:20px 16px 30px 16px;

}

h1{

text-align:center;

margin-bottom:20px;

}

#llista-noticies{

display:flex;

flex-direction:column;

gap:18px;

}

.bloc-noticia{

background:white;

color:#163B65;

border-radius:16px;

padding:16px;

box-shadow:0 6px 16px rgba(0,0,0,0.2);

}

.data-noticia{

font-size:13px;

color:#666;

margin-bottom:8px;

}

.bloc-noticia h2{

margin:0 0 8px 0;

font-size:22px;

}

.bloc-noticia p{

margin:0 0 10px 0;

line-height:1.4;

}
.targeta{
background:white;
border-radius:14px;
padding:14px;
margin-bottom:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.targeta-data{
font-size:13px;
font-weight:bold;
color:#163B65;
margin-bottom:6px;
text-transform:uppercase;
}

.targeta-titol{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
color:#111827;
}

.targeta-text{
font-size:15px;
line-height:1.45;
color:#374151;
white-space:pre-line;
}

.img-noticia{
width:100%;
border-radius:12px;
margin-bottom:10px;
display:block;
}

.boto-enllac{
display:inline-block;
margin-top:10px;
padding:6px 10px;
background:#163B65;
color:white;
text-decoration:none;
border-radius:6px;
font-size:14px;
font-weight:bold;
}  
  
</style>

</head>

<body>

<div class="barra-superior">
  <a href="index.html" class="boto-tornar" onclick="history.back(); return false;">←</a>
  <div class="titol-pagina">NOTÍCIES</div>
</div>
  
<div class="app">

<div id="llista-noticies">
Carregant...
</div>

</div>

<script>

const URL_NOTICIES =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRjIrH9BJexOjcXQi-VCfEvaz_Icg2xJU4eUQpiQoYCaLj6s9UxJKbT1ULJG5SGSQ/pub?output=csv";

async function carregarNoticies(){

const resposta = await fetch(URL_NOTICIES,{cache:"no-store"});

const text = await resposta.text();

const files = text.split("\n").slice(1);

let html="";

files.forEach(function(linia){

const camps = linia.split(",");

const data = camps[1];
const titol = camps[2];
const textNoticia = camps[3];
const imatge = camps[4];
const enllac = camps[5];

const visible = camps[0];

const data = camps[1];

const titol = camps[2];

const text = camps[3];

if(visible.trim().toLowerCase() === "si"){

html += `
<div class="targeta">

  ${imatge ? `<img src="${imatge.trim()}" class="img-noticia">` : ""}

  <div class="targeta-data">${data ? data.trim() : ""}</div>

  <div class="targeta-titol">${titol ? titol.trim() : ""}</div>

  <div class="targeta-text">${textNoticia ? textNoticia.trim() : ""}</div>

  ${enllac ? `<a href="${enllac.trim()}" target="_blank" class="boto-enllac">Veure més</a>` : ""}

</div>
`;
}

});

document.getElementById("llista-noticies").innerHTML = html;

}

carregarNoticies();

</script>

</body>

</html>
