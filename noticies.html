<!DOCTYPE html>

<html lang="ca">

<head>

<meta charset="UTF-8">

<title>Notícies</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

.barra-superior{
display:flex;
align-items:center;
gap:12px;
padding:10px 14px;
background:#163B65;
color:white;
position:sticky;
top:0;
z-index:1000;
}

.boto-tornar{
color:white;
text-decoration:none;
font-size:24px;
font-weight:bold;
line-height:1;
display:inline-block;
padding:2px 4px;
}
.titol-pagina{
font-size:18px;
font-weight:bold;
letter-spacing:0.3px;
}
  
body{

margin:0;

font-family:Arial, Helvetica, sans-serif;

background:#163B65;

color:white;

}

.app{

max-width:700px;

margin:auto;

padding:20px 16px 30px 16px;

}

h1{

text-align:center;

margin-bottom:20px;

}

#llista-noticies{

display:flex;

flex-direction:column;

gap:18px;

}

.bloc-noticia{

background:white;

color:#163B65;

border-radius:16px;

padding:16px;

box-shadow:0 6px 16px rgba(0,0,0,0.2);

}

.data-noticia{

font-size:13px;

color:#666;

margin-bottom:8px;

}

.bloc-noticia h2{

margin:0 0 8px 0;

font-size:22px;

}

.bloc-noticia p{

margin:0 0 10px 0;

line-height:1.4;

}
.targeta{
background:white;
border-radius:14px;
padding:14px;
margin-bottom:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.targeta-data{
font-size:13px;
font-weight:bold;
color:#163B65;
margin-bottom:6px;
text-transform:uppercase;
}

.targeta-titol{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
color:#111827;
}

.targeta-text{
font-size:15px;
line-height:1.45;
color:#374151;
white-space:pre-line;
}

.img-noticia{
width:100%;
border-radius:12px;
margin-bottom:10px;
display:block;
}

.boto-enllac{
display:inline-block;
margin-top:10px;
padding:6px 10px;
background:#163B65;
color:white;
text-decoration:none;
border-radius:6px;
font-size:14px;
font-weight:bold;
}  
  
</style>

</head>

<body>

<div class="barra-superior">
  <a href="index.html" class="boto-tornar" onclick="history.back(); return false;">←</a>
  <div class="titol-pagina">NOTÍCIES</div>
</div>
  
<div class="app">

<div id="llista-noticies">
Carregant...
</div>

</div>

<script>

const URL_NOTICIES = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjIrH9BJexOjcXQi-VCfEvaz_Icg2xJU4eUQpiQoYCaLj6s9UxJKbT1ULJG5SGSQ/pub?output=csv";

function parseCSV(text){
  const lines = text.trim().split("\n");
  return lines.map(line => {
    const result = [];
    let current = "";
    let insideQuotes = false;

    for(let i=0; i<line.length; i++){
      const char = line[i];

      if(char === '"'){
        if(insideQuotes && line[i + 1] === '"'){
          current += '"';
          i++;
        } else {
          insideQuotes = !insideQuotes;
        }
      } else if(char === "," && !insideQuotes){
        result.push(current);
        current = "";
      } else {
        current += char;
      }
    }

    result.push(current);
    return result;
  });
}

function formatData(dataISO){
  if(!dataISO) return "";
  const parts = dataISO.split("-");
  if(parts.length !== 3) return dataISO;
  return `${parts[2]}-${parts[1]}-${parts[0]}`;
}

fetch(URL_NOTICIES)
  .then(response => response.text())
  .then(csv => {

    const files = parseCSV(csv);
    const capcalera = files[0];
    const filesDades = files.slice(1);

    const idxVisible = capcalera.indexOf("visible");
    const idxData = capcalera.indexOf("data");
    const idxTitol = capcalera.indexOf("titol");
    const idxText = capcalera.indexOf("text");
    const idxImatge = capcalera.indexOf("imatge");
    const idxEnllac = capcalera.indexOf("enllac");

    const noticies = filesDades
      .filter(f => f[idxVisible] && f[idxVisible].trim().toLowerCase() === "si")
      .sort((a,b) => new Date(b[idxData]) - new Date(a[idxData]));

    const contenidor = document.getElementById("llista-noticies");

    if(noticies.length === 0){
      contenidor.innerHTML = "<div class='targeta'>No hi ha cap notícia visible.</div>";
      return;
    }

    contenidor.innerHTML = noticies.map(f => `
      <div class="targeta">

        ${f[idxImatge] ? `<img src="${f[idxImatge].trim()}" class="img-noticia">` : ""}

        <div class="targeta-data">${formatData(f[idxData])}</div>

        <div class="targeta-titol">${f[idxTitol] || ""}</div>

        <div class="targeta-text">${f[idxText] || ""}</div>

        ${f[idxEnllac] ? `<a href="${f[idxEnllac].trim()}" target="_blank" class="boto-enllac">Veure més</a>` : ""}

      </div>
    `).join("");

  })
  .catch(error => {
    document.getElementById("llista-noticies").innerHTML =
      "<div class='targeta'>Error carregant notícies.</div>";
    console.error(error);
  });

</script>
</script>

</body>

</html>
