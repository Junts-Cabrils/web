<!DOCTYPE html>

<html lang="ca">

<head>

<meta charset="UTF-8">

<title>Notícies</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

.barra-superior {
  padding: 10px;
  background: #163B65;
}

.boto-tornar {
  color: white;
  text-decoration: none;
  font-weight: bold;
  font-size: 16px;
}

body{

margin:0;

font-family:Arial, Helvetica, sans-serif;

background:#163B65;

color:white;

}

.app{

max-width:700px;

margin:auto;

padding:20px 16px 30px 16px;

}

h1{

text-align:center;

margin-bottom:20px;

}

#llista-noticies{

display:flex;

flex-direction:column;

gap:18px;

}

.bloc-noticia{

background:white;

color:#163B65;

border-radius:16px;

padding:16px;

box-shadow:0 6px 16px rgba(0,0,0,0.2);

}

.data-noticia{

font-size:13px;

color:#666;

margin-bottom:8px;

}

.bloc-noticia h2{

margin:0 0 8px 0;

font-size:22px;

}

.bloc-noticia p{

margin:0 0 10px 0;

line-height:1.4;

}

</style>

</head>

<body>

<div class="barra-superior">
  <a href="index.html" class="boto-tornar" onclick="history.back(); return false;">
    ← Tornar
  </a>
</div>
  
<div class="app">

<h1>Notícies</h1>

<div id="llista-noticies">
Carregant...
</div>

</div>

<script>

const URL_NOTICIES =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRjIrH9BJexOjcXQi-VCfEvaz_Icg2xJU4eUQpiQoYCaLj6s9UxJKbT1ULJG5SGSQ/pub?output=csv";

async function carregarNoticies(){

const resposta = await fetch(URL_NOTICIES,{cache:"no-store"});

const text = await resposta.text();

const files = text.split("\n").slice(1);

let html="";

files.forEach(function(linia){

const camps = linia.split(",");

const visible = camps[0];

const data = camps[1];

const titol = camps[2];

const text = camps[3];

if(visible==="si"){

html += `
<div class="bloc-noticia">

<div class="data-noticia">${data}</div>

<h2>${titol}</h2>

<p>${text}</p>

</div>
`;

}

});

document.getElementById("llista-noticies").innerHTML = html;

}

carregarNoticies();

</script>

</body>

</html>
