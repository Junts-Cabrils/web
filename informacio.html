<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Guia Cabrils</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#163B65">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icona-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icona-512.png">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8D1EM8HE48"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8D1EM8HE48');
  </script>

  <style>
    :root{
      --fosc:#26545E;
      --clar:#00c3b2;
      --blanc:#ffffff;
      --ressaltat:#ffeb3b;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--fosc);
      color:white;
      overflow-x:hidden;
    }

    .pagina{
      max-width:600px;
      margin:auto;
      padding:15px;
      box-sizing:border-box;
    }

    .barra-superior{
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px 0;
      position:sticky;
      top:0;
      background:var(--fosc);
      z-index:100;
    }

    .boto-tornar{
      color:white;
      text-decoration:none;
      font-size:24px;
      font-weight:bold;
      line-height:1;
    }

    .titol-pagina{
      font-weight:bold;
      font-size:14px;
      color:white;
    }

    .cercador{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:none;
      margin-bottom:15px;
      font-size:16px;
      box-sizing:border-box;
      display:block;
    }

    .avis-guia{
      font-size:13px;
      line-height:1.3;
      color:#ffffff;
      margin:-4px 0 4px 0;
      text-align:center;
    }

    .avis-guia a{
      color:#00c3b2;
      text-decoration:none;
      font-weight:bold;
    }

    .contenidor-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:4px;
      width:100%;
      align-items:start;
    }

    .bloc-cat{
      display:block;
      width:100%;
      min-width:0;
    }

    .btn-cat{
      background:var(--blanc);
      color:var(--fosc);
      padding:14px 5px;
      border-radius:8px;
      border:none;
      font-weight:bold;
      font-size:11px;
      cursor:pointer;
      text-align:center;
      box-shadow:0 3px 6px rgba(0,0,0,0.2);
      width:100%;
      text-transform:uppercase;
    }

    .btn-actiu{
      background:var(--clar) !important;
      color:white !important;
      box-shadow:0 0 0 2px #ffffff, 0 6px 14px rgba(0,0,0,0.28);
      transform:translateY(1px);
    }

    .btn-inactiu-paralel{
      opacity:0.78;
    }

    .panell-obert{
      grid-column:1 / -1;
      display:flex;
      flex-direction:column;
      gap:4px;
      margin-top:-2px;
      margin-bottom:2px;
      width:100%;
    }

    .resultats-cerca{
      display:none;
      flex-direction:column;
      gap:10px;
      margin-top:8px;
      width:100%;
    }


    .targeta{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:8px;
      padding:8px;
      background:var(--blanc);
      color:var(--fosc);
      border-radius:10px;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
      width:100%;
    }

    .titol-lloc{
      font-weight:bold;
      font-size:15px;
      color:#163B65;
      display:block;
      margin-bottom:2px;
    }

    .detalls-lloc{
      font-size:12px;
      color:#666;
      display:block;
      line-height:1.25;
      margin-bottom:8px;
    }


    .info-lloc{
      flex:1;
      min-width:0;
    }
    
    .accions-2x2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:4px;
      width:116px;
      flex-shrink:0;
    }
    
    .btn-acc{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:24px;
      padding:2px 4px;
      border-radius:6px;
      text-decoration:none;
      font-size:8px;
      font-weight:bold;
      line-height:1;
      background:#f0f4f4;
      color:var(--fosc);
      border:1px solid #ddd;
      text-align:center;
    }
    
    .btn-truca{
      background:var(--clar);
      color:white;
      border:none;
    }

    .msg-error{
      text-align:center;
      color:var(--ressaltat);
      padding:16px;
      font-weight:bold;
    }

    @media (max-width:520px){
      .btn-cat{
        font-size:10px;
        padding:12px 4px;
      }

      .btn-acc{
        font-size:9px;
      }
    }
  </style>
</head>
<body>


  <div class="pagina">
    <div class="barra-superior">
      <a href="index.html" class="boto-tornar">←</a>
      <div class="titol-pagina">GUIA DE SERVEIS CABRILS</div>
    </div>

    <div style="background:#ffffff; color:#26545E; border-radius:10px; padding:20px; text-align:center; margin-top:20px;">
      Aquest apartat està temporalment sense contingut.
    </div>
  </div>


</body>
</html>
