<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Guia Cabrils</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { --fosc: #26545E; --clar: #00c3b2; --blanc: #ffffff; --ressaltat: #ffeb3b; }
    body { margin: 0; font-family: Arial, sans-serif; background: var(--fosc); color: white; }
    .pagina { max-width: 600px; margin: auto; padding: 15px; }
    .barra-superior { display:flex; align-items:center; gap:12px; padding:10px 0; position:sticky; top:0; background:var(--fosc); z-index:10; }
    .boto-tornar { color:white; text-decoration:none; font-size:24px; font-weight:bold; }
    .cercador { width:100%; padding:12px; border-radius:10px; border:none; margin-bottom:15px; font-size:16px; box-sizing:border-box; }
    
    /* Una sola columna per a màxima estabilitat */
    .columna-unica { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    
    .btn-cat { background: var(--blanc); color: var(--fosc); padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; text-align: center; box-shadow: 0 3px 6px rgba(0,0,0,0.2); text-transform: uppercase; }
    .btn-actiu { background: var(--clar) !important; color: white !important; }
    
    #resultats-guia { display: flex; flex-direction: column; gap: 12px; }
    .targeta { background: var(--blanc); color: var(--fosc); padding: 12px; border-radius: 10px; }
    .titol-lloc { font-weight: bold; font-size: 16px; color: #163B65; display: block; margin-bottom: 3px; }
    .detalls-lloc { font-size: 13px; color: #666; display: block; line-height: 1.3; margin-bottom: 10px; }
    .accions { display: flex; gap: 8px; }
    .btn-acc { flex: 1; background: #f0f4f4; color: var(--fosc); text-align: center; padding: 10px 2px; border-radius: 6px; text-decoration: none; font-size: 11px; font-weight: bold; border: 1px solid #ddd; }
    .btn-truca { background: var(--clar); color: white; border: none; }
  </style>
</head>
<body>
<div class="pagina">
  <div class="barra-superior">
    <a href="index.html" class="boto-tornar">←</a>
    <div style="font-weight:bold;">GUIA DE SERVEIS CABRILS</div>
  </div>
  
  <input type="text" id="cercador" class="cercador" placeholder="Cerca establiment o servei..." onkeyup="filtrar()">
  
  <div id="llista-categories" class="columna-unica"></div>
  <div id="resultats-guia"></div>
</div>

<script>
  // Fem servir només el full principal (gid=0) per evitar errors de fetch múltiples
  const URL_DATA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTcBpzsIwQmH4aiRLnH7_WH9DzhZSwKuMeOBi1IoxYJ5VGHOcZsNjDvS437xUibkw/pub?gid=0&output=csv";

  let DADES = [];

  async function carregarDades() {
    try {
      const resposta = await fetch(URL_DATA);
      const text = await resposta.text();
      DADES = parseCSV(text).filter(f => f.visible?.toLowerCase() === "si");
      generarBotons();
    } catch (e) {
      document.getElementById("resultats-guia").innerHTML = "<p style='text-align:center;'>⚠️ Error carregant dades.</p>";
    }
  }

  function generarBotons() {
    const contenidor = document.getElementById("llista-categories");
    const categories = [...new Set(DADES.map(d => d.categoria))].filter(Boolean);
    
    categories.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "btn-cat";
      btn.innerText = cat;
      btn.onclick = () => {
        document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('btn-actiu'));
        btn.classList.add("btn-actiu");
        mostrarLlista(cat);
      };
      contenidor.appendChild(btn);
    });
  }

  function mostrarLlista(categoria, filtre = "") {
    const contenidor = document.getElementById("resultats-guia");
    const filtrats = filtre 
      ? DADES.filter(d => d.nom.toLowerCase().includes(filtre.toLowerCase()))
      : DADES.filter(d => d.categoria === categoria);

    contenidor.innerHTML = `<h3 style="color:var(--clar); border-bottom:1px solid; padding-bottom:5px;">${filtre ? 'Resultats' : categoria}</h3>`;

    filtrats.forEach(lloc => {
      const telf = lloc.telefon?.replace(/\s+/g, '') || "";
      contenidor.innerHTML += `
        <div class="targeta">
          <span class="titol-lloc">${lloc.nom}</span>
          <span class="detalls-lloc">📍 ${lloc.lloc || 'Cabrils'} <br> ⏰ ${lloc.horari || 'Consultar'}</span>
          <div class="accions">
            ${telf ? `<a href="tel:${telf}" class="btn-acc btn-truca">📞 TRUCA</a>` : ''}
            <a href="https://www.google.com/maps/search/${encodeURIComponent(lloc.nom + ' Cabrils')}" target="_blank" class="btn-acc">📍 MAPA</a>
          </div>
        </div>`;
    });
  }

  function filtrar() {
    const text = document.getElementById('cercador').value;
    if (text.length > 1) {
      document.getElementById("llista-categories").style.display = "none";
      mostrarLlista(null, text);
    } else {
      document.getElementById("llista-categories").style.display = "flex";
      document.getElementById("resultats-guia").innerHTML = "";
    }
  }

  function parseCSV(t) {
    const lines = t.trim().split(/\r?\n/);
    const headers = lines[0].split(",").map(h => h.trim().toLowerCase().replace(/['"]+/g, ''));
    return lines.slice(1).map(line => {
      const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
      const obj = {};
      headers.forEach((h, i) => obj[h] = (values[i] || "").trim().replace(/^"|"$/g, ''));
      return obj;
    });
  }

  carregarDades();
</script>
</body>
</html>
