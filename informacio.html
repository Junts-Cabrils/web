<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Guia Cabrils</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#163B65">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icona-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icona-512.png">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8D1EM8HE48"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8D1EM8HE48');
  </script>

  <style>
    :root{
      --fosc:#26545E;
      --clar:#00c3b2;
      --blanc:#ffffff;
      --ressaltat:#ffeb3b;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--fosc);
      color:white;
      overflow-x:hidden;
    }

    .pagina{
      max-width:600px;
      margin:auto;
      padding:15px;
      box-sizing:border-box;
    }

    .barra-superior{
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px 0;
      position:sticky;
      top:0;
      background:var(--fosc);
      z-index:100;
    }

    .boto-tornar{
      color:white;
      text-decoration:none;
      font-size:24px;
      font-weight:bold;
      line-height:1;
    }

    .titol-pagina{
      font-weight:bold;
      font-size:14px;
      color:white;
    }

    .cercador{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:none;
      margin-bottom:15px;
      font-size:16px;
      box-sizing:border-box;
      display:block;
    }

    .avis-guia{
      font-size:13px;
      line-height:1.3;
      color:#ffffff;
      margin:-4px 0 4px 0;
      text-align:center;
    }

    .avis-guia a{
      color:#00c3b2;
      text-decoration:none;
      font-weight:bold;
    }

    .contenidor-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:4px;
      width:100%;
      align-items:start;
    }

    .bloc-cat{
      display:block;
      width:100%;
      min-width:0;
    }

    .btn-cat{
      background:var(--blanc);
      color:var(--fosc);
      padding:14px 5px;
      border-radius:8px;
      border:none;
      font-weight:bold;
      font-size:11px;
      cursor:pointer;
      text-align:center;
      box-shadow:0 3px 6px rgba(0,0,0,0.2);
      width:100%;
      text-transform:uppercase;
    }

    .btn-actiu{
      background:var(--clar) !important;
      color:white !important;
      box-shadow:0 0 0 2px #ffffff, 0 6px 14px rgba(0,0,0,0.28);
      transform:translateY(1px);
    }

    .btn-inactiu-paralel{
      opacity:0.78;
    }

    .panell-obert{
      grid-column:1 / -1;
      display:flex;
      flex-direction:column;
      gap:4px;
      margin-top:-2px;
      margin-bottom:2px;
      width:100%;
    }

    .resultats-cerca{
      display:none;
      flex-direction:column;
      gap:10px;
      margin-top:8px;
      width:100%;
    }


    .targeta{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:8px;
      padding:8px;
      background:var(--blanc);
      color:var(--fosc);
      border-radius:10px;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }

    .titol-lloc{
      font-weight:bold;
      font-size:15px;
      color:#163B65;
      display:block;
      margin-bottom:2px;
    }

    .detalls-lloc{
      font-size:12px;
      color:#666;
      display:block;
      line-height:1.25;
      margin-bottom:8px;
    }


    .info-lloc{
      flex:1;
      min-width:0;
    }
    
    .accions-vertical{
      display:flex;
      flex-direction:column;
      gap:4px;
      width:72px;
      flex-shrink:0;
    }
    .btn-acc{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:22px;
      padding:1px 3px;
      border-radius:6px;
      text-decoration:none;
      font-size:8px;
      font-weight:bold;
      line-height:1;
      background:#f0f4f4;
      color:var(--fosc);
      border:1px solid #ddd;
    }
    
    .btn-truca{
      background:var(--clar);
      color:white;
      border:none;
    }

    .msg-error{
      text-align:center;
      color:var(--ressaltat);
      padding:16px;
      font-weight:bold;
    }

    @media (max-width:520px){
      .btn-cat{
        font-size:10px;
        padding:12px 4px;
      }

      .btn-acc{
        font-size:9px;
      }
    }
  </style>
</head>
<body>

<div class="pagina">

  <div class="barra-superior">
    <a href="index.html" class="boto-tornar">←</a>
    <div class="titol-pagina">GUIA DE SERVEIS CABRILS</div>
  </div>

  <input
    type="text"
    id="cercador"
    class="cercador"
    placeholder="Cerca establiment o servei..."
    onkeyup="filtrar()"
  >

  <div class="avis-guia">
    Si vols afegir o actualitzar una fitxa, envia un
    <a href="mailto:info@juntspercabrils.cat" onclick="trackEvent('click_email_guia')">correu</a>.
  </div>

  <div id="contenidor-categories" class="contenidor-grid"></div>
  <div id="resultats-cerca" class="resultats-cerca"></div>

</div>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
  }

  const URL_1 = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTcBpzsIwQmH4aiRLnH7_WH9DzhZSwKuMeOBi1IoxYJ5VGHOcZsNjDvS437xUibkw/pub?output=csv";
  const URL_2 = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQNOZBoyYn-qDUWU49ruAVDs_4aPatzTjaHlaMs6Zrv-gE3q3Bav3RG_XxA9lxUmA/pub?output=csv";

  let DADES_TOTALS = [];
  let CATEGORIES_ORDRE = [];

  function trackEvent(nom, dades = {}) {
    if (typeof gtag === "function") {
      gtag("event", nom, dades);
    }
  }

  function normalitza(text){
    return String(text || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "");
  }

  function escapeHtml(text) {
    return String(text || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function escapeAttr(text) {
    return String(text || "")
      .replaceAll("\\", "\\\\")
      .replaceAll("'", "\\'");
  }

  function splitCSVLine(line) {
    const resultat = [];
    let actual = "";
    let dinsCometes = false;

    for (let i = 0; i < line.length; i++) {
      const char = line[i];

      if (char === '"') {
        if (dinsCometes && line[i + 1] === '"') {
          actual += '"';
          i++;
        } else {
          dinsCometes = !dinsCometes;
        }
      } else if (char === "," && !dinsCometes) {
        resultat.push(actual);
        actual = "";
      } else {
        actual += char;
      }
    }

    resultat.push(actual);
    return resultat;
  }

  function parseCSV(text) {
    if (!text) return [];

    const files = text.trim().split(/\r?\n/);
    if (files.length < 2) return [];

    const capcaleres = splitCSVLine(files[0]).map(h =>
      h.trim().toLowerCase().replace(/['"]+/g, "")
    );

    return files.slice(1).map(fila => {
      const valors = splitCSVLine(fila);
      const obj = {};

      capcaleres.forEach((h, i) => {
        obj[h] = (valors[i] || "").trim().replace(/^"|"$/g, "");
      });

      return obj;
    });
  }

    function crearTargeta(lloc) {
      const telf = (lloc.telefon || "").replace(/\s+/g, "");
      const mail = (lloc.email || "").trim();
      const mapa = `https://www.google.com/maps/search/${encodeURIComponent((lloc.nom || "") + " Cabrils")}`;
      const web = lloc.web
        ? (lloc.web.startsWith("http") ? lloc.web : "https://" + lloc.web)
        : "";
    
      return `
        <div class="targeta">
          
          <div class="info-lloc">
            <span class="titol-lloc">${escapeHtml(lloc.nom || "")}</span>
            <span class="detalls-lloc">
              📍 ${escapeHtml(lloc.lloc || "Cabrils")}<br>
              ⏰ ${escapeHtml(lloc.horari || "Consultar")}
            </span>
          </div>
    
          <div class="accions-vertical">
            ${telf ? `<a href="tel:${telf}" class="btn-acc btn-truca" onclick="trackEvent('click_truca_guia')">TRUCA</a>` : ""}
            ${mail ? `<a href="mailto:${mail}" class="btn-acc" onclick="trackEvent('click_mail_guia')">MAIL</a>` : ""}
            <a href="${mapa}" target="_blank" class="btn-acc" onclick="trackEvent('click_mapa_guia')">MAPA</a>
            ${web ? `<a href="${web}" target="_blank" class="btn-acc" onclick="trackEvent('click_web_guia')">WEB</a>` : ""}
          </div>
    
        </div>
      `;
    }

  function construirOrdreCategories(d1, d2) {
    const cats1 = [...new Set(d1.map(d => d.categoria))].filter(Boolean);
    const cats2 = [...new Set(d2.map(d => d.categoria))].filter(Boolean);

    const ordre = [];
    const max = Math.max(cats1.length, cats2.length);

    for (let i = 0; i < max; i++) {
      if (cats1[i]) ordre.push(cats1[i]);
      if (cats2[i]) ordre.push(cats2[i]);
    }

    return ordre;
  }

  function tancarTotesLesCategories() {
    document.querySelectorAll(".btn-cat").forEach(b => {
      b.classList.remove("btn-actiu");
      b.classList.remove("btn-inactiu-paralel");
    });

    const panell = document.getElementById("panell-obert");
    if (panell) panell.remove();
  }

  function amagarResultatsCerca() {
    const caixa = document.getElementById("resultats-cerca");
    caixa.style.display = "none";
    caixa.innerHTML = "";
  }

  function crearPanellObert(titol, dadesFiltrades) {
    const panell = document.createElement("div");
    panell.id = "panell-obert";
    panell.className = "panell-obert";

    if (!dadesFiltrades || dadesFiltrades.length === 0) {
      panell.innerHTML = `
        <div class="cap-resultats">${escapeHtml(titol)}</div>
        <div class="msg-error">No hi ha resultats en aquesta categoria.</div>
      `;
      return panell;
    }

    panell.innerHTML =
      dadesFiltrades.map(crearTargeta).join("");

    return panell;
  }

  function obrirCategoria(cat, bloc, btn) {
    const jaActiu = btn.classList.contains("btn-actiu");
    const contenidor = document.getElementById("contenidor-categories");
    const blocs = Array.from(contenidor.querySelectorAll(".bloc-cat"));

    document.getElementById("cercador").value = "";
    amagarResultatsCerca();

    if (jaActiu) {
      tancarTotesLesCategories();
      return;
    }

    tancarTotesLesCategories();
    btn.classList.add("btn-actiu");

    const indexActual = blocs.indexOf(bloc);
    let indexParalel = (indexActual % 2 === 0) ? indexActual + 1 : indexActual - 1;

    if (blocs[indexParalel]) {
      const botoParalel = blocs[indexParalel].querySelector(".btn-cat");
      if (botoParalel) {
        botoParalel.classList.add("btn-inactiu-paralel");
      }
    }

    const dadesFiltrades = DADES_TOTALS.filter(item => item.categoria === cat);
    const panell = crearPanellObert(cat, dadesFiltrades);

    let indexFinalFila = (indexActual % 2 === 0) ? indexActual + 1 : indexActual;
    const blocFinalFila = blocs[indexFinalFila];

    if (blocFinalFila && blocFinalFila.nextSibling) {
      contenidor.insertBefore(panell, blocFinalFila.nextSibling);
    } else {
      contenidor.appendChild(panell);
    }

    setTimeout(() => {
      bloc.scrollIntoView({
        behavior: "smooth",
        block: "nearest"
      });
    }, 50);
  }

  function dibuixarCategories() {
    const contenidor = document.getElementById("contenidor-categories");
    contenidor.innerHTML = "";

    CATEGORIES_ORDRE.forEach(cat => {
      const bloc = document.createElement("div");
      bloc.className = "bloc-cat";

      const btn = document.createElement("button");
      btn.className = "btn-cat";
      btn.innerText = cat;
      btn.onclick = () => obrirCategoria(cat, bloc, btn);

      bloc.appendChild(btn);
      contenidor.appendChild(bloc);
    });
  }

  function filtrar() {
    const val = document.getElementById("cercador").value.trim();
    const caixa = document.getElementById("resultats-cerca");

    tancarTotesLesCategories();

    if (!val) {
      amagarResultatsCerca();
      return;
    }

    const cerca = normalitza(val);

    const resultats = DADES_TOTALS.filter(d =>
      normalitza(d.nom).includes(cerca) ||
      normalitza(d.categoria).includes(cerca) ||
      normalitza(d.lloc).includes(cerca)
    );

    caixa.style.display = "flex";

    if (resultats.length === 0) {
      caixa.innerHTML = `<div class="msg-error">No s'han trobat resultats.</div>`;
      return;
    }

    caixa.innerHTML =
      `<div class="cap-resultats">RESULTATS</div>` +
      resultats.map(crearTargeta).join("");
  }

  async function carregarDades() {
    try {
      const [r1, r2] = await Promise.all([
        fetch(URL_1, { cache: "no-store" }),
        fetch(URL_2, { cache: "no-store" })
      ]);

      const t1 = await r1.text();
      const t2 = await r2.text();

      const p1 = parseCSV(t1);
      const p2 = parseCSV(t2);

      const d1 = p1.filter(f => String(f.visible || "").trim().toLowerCase() === "si");
      const d2 = p2.filter(f => String(f.visible || "").trim().toLowerCase() === "si");

      DADES_TOTALS = [...d1, ...d2];
      CATEGORIES_ORDRE = construirOrdreCategories(d1, d2);

      dibuixarCategories();

      if (DADES_TOTALS.length === 0) {
        document.querySelector(".pagina").insertAdjacentHTML(
          "beforeend",
          `<div class="msg-error">No hi ha establiments visibles.</div>`
        );
      }

    } catch (e) {
      document.querySelector(".pagina").insertAdjacentHTML(
        "beforeend",
        `<div class="msg-error">⚠️ Error de connexió amb Google Sheets.<br>Torna a carregar la pàgina.</div>`
      );
      console.error(e);
    }
  }

  carregarDades();
</script>

<div style="text-align:center; font-size:12px; margin:-6px 0 2px 0;">
  <a href="privacitat.html" style="color:#00c3b2; text-decoration:none;">
    Privacitat
  </a>
</div>

</body>
</html>
