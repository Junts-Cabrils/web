<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Guia Cabrils</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#163B65">
  <style>
    :root { --fosc: #26545E; --clar: #00c3b2; --blanc: #ffffff; }
    body { margin: 0; font-family: Arial, sans-serif; background: var(--fosc); color: white; }
    .pagina { max-width: 600px; margin: auto; padding: 15px; }
    .barra-superior { display:flex; align-items:center; gap:12px; padding:10px 0; position:sticky; top:0; background:var(--fosc); z-index:10; }
    .boto-tornar { color:white; text-decoration:none; font-size:24px; font-weight:bold; padding:5px; }
    .cercador { width:100%; padding:12px; border-radius:10px; border:none; margin-bottom:15px; font-size:16px; box-sizing:border-box; }
    
    /* Botons de Categoria */
    .btn-cat { width:100%; background:var(--blanc); color:var(--fosc); padding:15px; border-radius:12px; margin-bottom:10px; border:none; font-weight:bold; text-align:left; font-size:16px; display:flex; justify-content:space-between; align-items:center; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    .llista-llocs { display:none; flex-direction:column; gap:10px; margin-bottom:20px; padding-left:10px; border-left:3px solid var(--clar); }
    
    /* Targeta Compacta */
    .targeta { background:var(--blanc); color:var(--fosc); padding:12px; border-radius:10px; }
    .titol-lloc { font-weight:bold; font-size:16px; color:#163B65; display:block; }
    .detalls-lloc { font-size:13px; color:#666; margin-bottom:8px; display:block; }
    .accions { display:flex; gap:8px; }
    .btn-acc { flex:1; background:#f0f4f4; color:var(--fosc); text-align:center; padding:8px; border-radius:6px; text-decoration:none; font-size:12px; font-weight:bold; border:1px solid #ddd; }
    .btn-truca { background:var(--clar); color:white; border:none; }
  </style>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8D1EM8HE48"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-8D1EM8HE48');</script>
</head>
<body>

<div class="pagina">
  <div class="barra-superior">
    <a href="index.html" class="boto-tornar">←</a>
    <div style="font-weight:bold;">GUIA DE SERVEIS CABRILS</div>
  </div>

  <input type="text" id="cercador" class="cercador" placeholder="Cerca establiment o servei..." onkeyup="filtrar()">
  <div id="contingut-guia"><p style="text-align:center;">Carregant dades...</p></div>
</div>

<script>
  const URL_GUIA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTcBpzsIwQmH4aiRLnH7_WH9DzhZSwKuMeOBi1IoxYJ5VGHOcZsNjDvS437xUibkw/pub?output=csv";

  async function carregarDades() {
    try {
      const res = await fetch(URL_GUIA, {cache: "no-store"});
      const csv = await res.text();
      const dades = parseCSV(csv).filter(f => f.visible && f.visible.trim().toLowerCase() === "si");
      
      if(dades.length === 0) {
        document.getElementById("contingut-guia").innerHTML = "<p style='text-align:center;'>No hi ha dades disponibles. Revisa que la fila 1 del Sheets sigui la capçalera.</p>";
        return;
      }

      const categories = [...new Set(dades.map(d => d.categoria))].sort();
      renderitzar(categories, dades);
    } catch (e) { document.getElementById("contingut-guia").innerHTML = "Error de connexió."; }
  }

  function renderitzar(cats, dades) {
    let html = "";
    cats.forEach(cat => {
      html += `<button class="btn-cat" onclick="toggleCat('${cat}')">${cat.toUpperCase()} <span>▼</span></button>`;
      html += `<div id="cat-${cat}" class="llista-llocs">`;
      dades.filter(d => d.categoria === cat).forEach(lloc => {
        html += `
          <div class="targeta">
            <span class="titol-lloc">${lloc.nom}</span>
            <span class="detalls-lloc">📍 ${lloc.lloc} | ⏰ ${lloc.horari}</span>
            <div class="accions">
              <a href="tel:${lloc.telefon}" class="btn-acc btn-truca">📞 TRUCAR</a>
              ${lloc.email ? `<a href="mailto:${lloc.email}" class="btn-acc">✉️ MAIL</a>` : ''}
              <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(lloc.nom + ' Cabrils')}" target="_blank" class="btn-acc">📍 MAPA</a>
            </div>
          </div>`;
      });
      html += `</div>`;
    });
    document.getElementById("contingut-guia").innerHTML = html;
  }

  function toggleCat(cat) {
    const el = document.getElementById('cat-'+cat);
    el.style.display = el.style.display === "flex" ? "none" : "flex";
  }

  function filtrar() {
    let val = document.getElementById('cercador').value.toLowerCase();
    let cats = document.getElementsByClassName('btn-cat');
    let llistes = document.getElementsByClassName('llista-llocs');
    for(let i=0; i<cats.length; i++) {
        let visible = llistes[i].innerText.toLowerCase().includes(val) || cats[i].innerText.toLowerCase().includes(val);
        cats[i].style.display = visible ? "flex" : "none";
        if(val.length > 1) llistes[i].style.display = visible ? "flex" : "none";
    }
  }

  function parseCSV(t){
    let lines = t.trim().split(/\r?\n/);
    let headers = lines[0].split(",").map(x => x.trim().toLowerCase());
    return lines.slice(1).map(line => {
      let values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
      let obj = {};
      headers.forEach((h, idx) => obj[h] = (values[idx] || "").trim().replace(/^"|"$/g, ''));
      return obj;
    });
  }
  carregarDades();
</script>
</body>
</html>
