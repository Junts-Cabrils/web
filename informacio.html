<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Guia Cabrils</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { --fosc: #26545E; --clar: #00c3b2; --blanc: #ffffff; --ressaltat: #ffeb3b; }
    body { margin: 0; font-family: Arial, sans-serif; background: var(--fosc); color: white; }
    .pagina { max-width: 600px; margin: auto; padding: 15px; }
    .barra-superior { display:flex; align-items:center; gap:12px; padding:10px 0; position:sticky; top:0; background:var(--fosc); z-index:10; }
    .boto-tornar { color:white; text-decoration:none; font-size:24px; font-weight:bold; }
    .cercador { width:100%; padding:12px; border-radius:10px; border:none; margin-bottom:15px; font-size:16px; box-sizing:border-box; width: 100%; }
    
    /* Grid forçat a dues columnes */
    .contenidor-grid { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 10px; 
      margin-bottom: 20px; 
      min-height: 50px;
    }
    .columna { display: flex; flex-direction: column; gap: 8px; }

    .btn-cat { background: var(--blanc); color: var(--fosc); padding: 14px 5px; border-radius: 8px; border: none; font-weight: bold; font-size: 12px; cursor: pointer; text-align: center; box-shadow: 0 3px 6px rgba(0,0,0,0.2); width: 100%; }
    .btn-actiu { background: var(--clar) !important; color: white !important; }
    
    #resultats-guia { display: flex; flex-direction: column; gap: 12px; }
    .targeta { background: var(--blanc); color: var(--fosc); padding: 12px; border-radius: 10px; }
    .titol-lloc { font-weight: bold; font-size: 16px; color: #163B65; display: block; margin-bottom: 3px; }
    .detalls-lloc { font-size: 13px; color: #666; display: block; line-height: 1.3; margin-bottom: 10px; }
    .accions { display: flex; gap: 6px; }
    .btn-acc { flex: 1; background: #f0f4f4; color: var(--fosc); text-align: center; padding: 8px 2px; border-radius: 6px; text-decoration: none; font-size: 10px; font-weight: bold; border: 1px solid #ddd; }
    .btn-truca { background: var(--clar); color: white; border: none; }
  </style>
</head>
<body>
<div class="pagina">
  <div class="barra-superior">
    <a href="index.html" class="boto-tornar">←</a>
    <div style="font-weight:bold;">GUIA DE SERVEIS CABRILS</div>
  </div>
  <input type="text" id="cercador" class="cercador" placeholder="Cerca establiment o servei..." onkeyup="filtrar()">
  
  <div class="contenidor-grid">
    <div id="col-1" class="columna"></div>
    <div id="col-2" class="columna"></div>
  </div>
  <div id="resultats-guia"></div>
</div>

<script>
  const DOC_ID = "1vTcBpzsIwQmH4aiRLnH7_WH9DzhZSwKuMeOBi1IoxYJ5VGHOcZsNjDvS437xUibkw";
  const proxy = "https://api.allorigins.win/get?url=";
  
  // URLs d'exportació directa
  const URL_1 = `${proxy}${encodeURIComponent(`https://docs.google.com/spreadsheets/d/${DOC_ID}/export?format=csv&gid=0`)}`;
  const URL_2 = `${proxy}${encodeURIComponent(`https://docs.google.com/spreadsheets/d/${DOC_ID}/export?format=csv&gid=2047395724`)}`;

  let DADES_TOTALS = [];

  async function carregarDades() {
    try {
      // Carreguem seqüencialment per evitar col·lapses del proxy
      const res1 = await fetch(URL_1).then(r => r.json());
      const d1 = parseCSV(res1.contents).filter(f => f.visible?.toLowerCase() === "si");
      crearBotons(d1, "col-1");

      const res2 = await fetch(URL_2).then(r => r.json());
      const d2 = parseCSV(res2.contents).filter(f => f.visible?.toLowerCase() === "si");
      crearBotons(d2, "col-2");

      DADES_TOTALS = [...d1, ...d2];
    } catch (e) {
      document.getElementById("resultats-guia").innerHTML = "<p style='text-align:center;'>⚠️ Error de connexió amb les dades.</p>";
    }
  }

  function crearBotons(dades, idContenidor) {
    const contenidor = document.getElementById(idContenidor);
    const catsFetes = new Set();
    
    // Ordenem per la columna "ordre"
    dades.sort((a, b) => (parseInt(a.ordre) || 99) - (parseInt(b.ordre) || 99));

    dades.forEach(d => {
      if (d.categoria && !catsFetes.has(d.categoria)) {
        catsFetes.add(d.categoria);
        const btn = document.createElement("button");
        btn.className = "btn-cat";
        btn.innerText = d.categoria.toUpperCase();
        btn.onclick = () => {
          document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('btn-actiu'));
          btn.classList.add("btn-actiu");
          renderitzarLlista(d.categoria);
        };
        contenidor.appendChild(btn);
      }
    });
  }

  function renderitzarLlista(categoria, filtre = "") {
    const contenidor = document.getElementById("resultats-guia");
    let llista = filtre.length > 1 
      ? DADES_TOTALS.filter(d => (d.nom + d.categoria).toLowerCase().includes(filtre.toLowerCase()))
      : DADES_TOTALS.filter(d => d.categoria === categoria);

    contenidor.innerHTML = `<div style="color:var(--clar); font-weight:bold; margin-bottom:10px; border-bottom:1px solid var(--clar); padding-bottom:5px;">${filtre ? 'RESULTATS' : categoria}</div>`;

    llista.forEach(lloc => {
      const telf = lloc.telefon?.replace(/\s+/g, '') || "";
      const mapaUrl = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(lloc.nom + " Cabrils");
      
      contenidor.innerHTML += `
        <div class="targeta">
          <span class="titol-lloc">${lloc.nom}</span>
          <span class="detalls-lloc">📍 ${lloc.lloc || 'Cabrils'} <br> ⏰ ${lloc.horari || 'Consultar'}</span>
          <div class="accions">
            ${telf ? `<a href="tel:${telf}" class="btn-acc btn-truca">📞 TRUCA</a>` : ''}
            <a href="${mapaUrl}" target="_blank" class="btn-acc">📍 MAPA</a>
            ${lloc.web ? `<a href="${lloc.web.startsWith('http') ? lloc.web : 'https://'+lloc.web}" target="_blank" class="btn-acc">🌐 WEB</a>` : ''}
          </div>
        </div>`;
    });
  }

  function filtrar() {
    const val = document.getElementById('cercador').value;
    if (val.length > 1) {
      document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('btn-actiu'));
      renderitzarLlista(null, val);
    } else if (val.length === 0) {
      document.getElementById("resultats-guia").innerHTML = "";
    }
  }

  function parseCSV(t) {
    if (!t) return [];
    const net = t.replace(/^\uFEFF/, "").trim();
    const lines = net.split(/\r?\n/);
    const headers = lines[0].split(",").map(h => h.trim().toLowerCase().replace(/['"]+/g, ''));
    return lines.slice(1).map(line => {
      const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
      const obj = {};
      headers.forEach((h, i) => obj[h] = (values[i] || "").trim().replace(/^"|"$/g, ''));
      return obj;
    });
  }
  carregarDades();
</script>
</body>
</html>
