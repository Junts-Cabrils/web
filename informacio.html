<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Guia Cabrils</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#163B65">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icona-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icona-512.png">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8D1EM8HE48"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8D1EM8HE48');
  </script>

  <style>
    :root{
      --fosc:#26545E;
      --clar:#00c3b2;
      --blanc:#ffffff;
      --ressaltat:#ffeb3b;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--fosc);
      color:white;
      overflow-x:hidden;
    }

    .pagina{
      max-width:600px;
      margin:auto;
      padding:15px;
      box-sizing:border-box;
    }

    .barra-superior{
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px 0;
      position:sticky;
      top:0;
      background:var(--fosc);
      z-index:100;
    }

    .boto-tornar{
      color:white;
      text-decoration:none;
      font-size:24px;
      font-weight:bold;
      line-height:1;
    }

    .titol-pagina{
      font-weight:bold;
      font-size:14px;
      color:white;
    }

    .cercador{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:none;
      margin-bottom:15px;
      font-size:16px;
      box-sizing:border-box;
      display:block;
    }

    .contenidor-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:20px;
      width:100%;
    }

    .columna{
      display:flex;
      flex-direction:column;
      gap:8px;
      min-width:0;
    }

    .btn-cat{
      background:var(--blanc);
      color:var(--fosc);
      padding:14px 5px;
      border-radius:8px;
      border:none;
      font-weight:bold;
      font-size:11px;
      cursor:pointer;
      text-align:center;
      box-shadow:0 3px 6px rgba(0,0,0,0.2);
      width:100%;
      text-transform:uppercase;
    }

    .btn-actiu{
      background:var(--clar) !important;
      color:white !important;
    }

    #resultats-guia{
      display:flex;
      flex-direction:column;
      gap:12px;
      padding-bottom:30px;
    }

    .cap-resultats{
      color:var(--clar);
      font-weight:bold;
      margin-top:10px;
      border-bottom:1px solid var(--clar);
      padding-bottom:5px;
    }

    .targeta{
      background:var(--blanc);
      color:var(--fosc);
      padding:12px;
      border-radius:10px;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }

    .titol-lloc{
      font-weight:bold;
      font-size:16px;
      color:#163B65;
      display:block;
      margin-bottom:3px;
    }

    .detalls-lloc{
      font-size:13px;
      color:#666;
      display:block;
      line-height:1.3;
      margin-bottom:10px;
    }

    .accions{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }

    .btn-acc{
      flex:1;
      min-width:70px;
      background:#f0f4f4;
      color:var(--fosc);
      text-align:center;
      padding:8px 2px;
      border-radius:6px;
      text-decoration:none;
      font-size:10px;
      font-weight:bold;
      border:1px solid #ddd;
    }

    .btn-truca{
      background:var(--clar);
      color:white;
      border:none;
    }

    .msg-error{
      text-align:center;
      color:var(--ressaltat);
      padding:20px;
      font-weight:bold;
    }

    @media (max-width:520px){
      .btn-cat{
        font-size:10px;
        padding:12px 4px;
      }

      .btn-acc{
        font-size:9px;
      }
    }
  </style>
</head>
<body>

<div class="pagina">

  <div class="barra-superior">
    <a href="index.html" class="boto-tornar">←</a>
    <div class="titol-pagina">GUIA DE SERVEIS CABRILS</div>
  </div>

  <input
    type="text"
    id="cercador"
    class="cercador"
    placeholder="Cerca establiment o servei..."
    onkeyup="filtrar()"
  >

  <div class="contenidor-grid">
    <div id="col-1" class="columna"></div>
    <div id="col-2" class="columna"></div>
  </div>

  <div id="resultats-guia">
    <div class="msg-error" style="color:#00c3b2;">Carregant establiments...</div>
  </div>

</div>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
  }

const URL_1 = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTcBpzsIwQmH4aiRLnH7_WH9DzhZSwKuMeOBi1IoxYJ5VGHOcZsNjDvS437xUibkw/pub?output=csv";
const URL_2 = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQNOZBoyYn-qDUWU49ruAVDs_4aPatzTjaHlaMs6Zrv-gE3q3Bav3RG_XxA9lxUmA/pub?output=csv";
  
  let DADES_TOTALS = [];
  let CATEGORIA_ACTIVA = "";

  function trackEvent(nom, dades = {}) {
    if (typeof gtag === "function") {
      gtag("event", nom, dades);
    }
  }

  function normalitza(text){
    return String(text || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "");
  }

  async function carregarDades() {
    try {
      const [r1, r2] = await Promise.all([
        fetch(URL_1, { cache: "no-store" }),
        fetch(URL_2, { cache: "no-store" })
      ]);

const t1 = await r1.text();
const t2 = await r2.text();

console.log("TEXT 1:", t1);
console.log("TEXT 2:", t2);

const p1 = parseCSV(t1);
const p2 = parseCSV(t2);

console.log("PARSE 1:", p1);
console.log("PARSE 2:", p2);

const d1 = p1.filter(f => String(f.visible || "").trim().toLowerCase() === "si");
const d2 = p2.filter(f => String(f.visible || "").trim().toLowerCase() === "si");

console.log("D1 visibles:", d1);
console.log("D2 visibles:", d2);

      DADES_TOTALS = [...d1, ...d2];

      dibuixarBotons(d1, "col-1");
      dibuixarBotons(d2, "col-2");

      const primeraCategoria =
        (d1.length > 0 && d1[0].categoria) ||
        (d2.length > 0 && d2[0].categoria) ||
        "";

      if (primeraCategoria) {
        CATEGORIA_ACTIVA = primeraCategoria;
        activarBotoPerText(primeraCategoria);
        renderitzar(primeraCategoria);
      } else {
        document.getElementById("resultats-guia").innerHTML =
          `<div class="msg-error">No hi ha establiments visibles.</div>`;
      }

    } catch (e) {
      document.getElementById("resultats-guia").innerHTML =
        `<div class="msg-error">⚠️ Error de connexió amb Google Sheets.<br>Torna a carregar la pàgina.</div>`;
      console.error(e);
    }
  }

  function dibuixarBotons(dades, idCol) {
    const col = document.getElementById(idCol);
    col.innerHTML = "";

    const cats = [...new Set(dades.map(d => d.categoria))].filter(Boolean);

    cats.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "btn-cat";
      btn.innerText = cat;

      btn.onclick = () => {
        document.getElementById("cercador").value = "";
        document.querySelectorAll(".btn-cat").forEach(b => b.classList.remove("btn-actiu"));
        btn.classList.add("btn-actiu");
        CATEGORIA_ACTIVA = cat;
        renderitzar(cat);
      };

      col.appendChild(btn);
    });
  }

  function activarBotoPerText(categoria) {
    document.querySelectorAll(".btn-cat").forEach(b => {
      b.classList.toggle("btn-actiu", b.innerText.trim() === categoria);
    });
  }

  function renderitzar(categoria, filtre = "") {
    const contenidor = document.getElementById("resultats-guia");

    if (DADES_TOTALS.length === 0) return;

    let llista;

    if (filtre.length > 1) {
      const cerca = normalitza(filtre);
      llista = DADES_TOTALS.filter(d =>
        normalitza(d.nom).includes(cerca) ||
        normalitza(d.categoria).includes(cerca) ||
        normalitza(d.lloc).includes(cerca)
      );
    } else {
      llista = DADES_TOTALS.filter(d => d.categoria === categoria);
    }

    contenidor.innerHTML =
      `<div class="cap-resultats">${filtre ? "RESULTATS" : (categoria || "").toUpperCase()}</div>`;

    if (llista.length === 0) {
      contenidor.innerHTML +=
        `<div class="msg-error" style="color:#26545E;background:#fff;border-radius:10px;">No s'han trobat resultats.</div>`;
      return;
    }

    llista.forEach(lloc => {
      const telf = (lloc.telefon || "").replace(/\s+/g, "");
      const mapa = `https://www.google.com/maps/search/${encodeURIComponent((lloc.nom || "") + " Cabrils")}`;
      const web = lloc.web
        ? (lloc.web.startsWith("http") ? lloc.web : "https://" + lloc.web)
        : "";

      contenidor.innerHTML += `
        <div class="targeta">
          <span class="titol-lloc">${escapeHtml(lloc.nom || "")}</span>
          <span class="detalls-lloc">
            📍 ${escapeHtml(lloc.lloc || "Cabrils")}<br>
            ⏰ ${escapeHtml(lloc.horari || "Consultar")}
          </span>
          <div class="accions">
            ${telf ? `<a href="tel:${telf}" class="btn-acc btn-truca" onclick="trackEvent('click_truca_guia', {nom: '${escapeAttr(lloc.nom || "")}'})">📞 TRUCA</a>` : ""}
            <a href="${mapa}" target="_blank" class="btn-acc" onclick="trackEvent('click_mapa_guia', {nom: '${escapeAttr(lloc.nom || "")}'})">📍 MAPA</a>
            ${web ? `<a href="${web}" target="_blank" class="btn-acc" onclick="trackEvent('click_web_guia', {nom: '${escapeAttr(lloc.nom || "")}'})">🌐 WEB</a>` : ""}
          </div>
        </div>
      `;
    });
  }

  function filtrar() {
    const val = document.getElementById("cercador").value.trim();

    if (val.length > 1) {
      document.querySelectorAll(".btn-cat").forEach(b => b.classList.remove("btn-actiu"));
      renderitzar(null, val);
    } else if (val.length === 0) {
      if (CATEGORIA_ACTIVA) {
        activarBotoPerText(CATEGORIA_ACTIVA);
        renderitzar(CATEGORIA_ACTIVA);
      } else {
        document.getElementById("resultats-guia").innerHTML = "";
      }
    }
  }

  function parseCSV(text) {
    if (!text) return [];

    const files = text.trim().split(/\r?\n/);
    if (files.length < 2) return [];

    const capcaleres = splitCSVLine(files[0]).map(h =>
      h.trim().toLowerCase().replace(/['"]+/g, "")
    );

    return files.slice(1).map(fila => {
      const valors = splitCSVLine(fila);
      const obj = {};

      capcaleres.forEach((h, i) => {
        obj[h] = (valors[i] || "").trim().replace(/^"|"$/g, "");
      });

      return obj;
    });
  }

  function splitCSVLine(line) {
    const resultat = [];
    let actual = "";
    let dinsCometes = false;

    for (let i = 0; i < line.length; i++) {
      const char = line[i];

      if (char === '"') {
        if (dinsCometes && line[i + 1] === '"') {
          actual += '"';
          i++;
        } else {
          dinsCometes = !dinsCometes;
        }
      } else if (char === "," && !dinsCometes) {
        resultat.push(actual);
        actual = "";
      } else {
        actual += char;
      }
    }

    resultat.push(actual);
    return resultat;
  }

  function escapeHtml(text) {
    return String(text || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function escapeAttr(text) {
    return String(text || "")
      .replaceAll("\\", "\\\\")
      .replaceAll("'", "\\'");
  }

  carregarDades();
</script>

<div style="text-align:center; font-size:12px; margin:2px;">
  <a href="privacitat.html" style="color:#00c3b2; text-decoration:none;">
    Privacitat
  </a>
</div>

</body>
</html>
